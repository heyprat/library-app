<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pratyush's Library — Snake</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body {
  background: #f5f1ea;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: #2a2a2a;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

canvas#game {
  display: block;
  position: fixed;
  inset: 0;
}

#score-bar {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 24px;
  padding: 8px 24px;
  font-size: 14px;
  color: #5a5a5a;
  letter-spacing: 0.03em;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

#start-screen {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(245,241,234,0.96);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: opacity 0.5s ease;
}

#start-screen.hidden { opacity: 0; pointer-events: none; }

#start-screen h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(36px, 7vw, 64px);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: #2a2a2a;
}

#start-screen p { color: #999; font-size: 16px; }

.start-key-hint {
  display: inline-block;
  padding: 8px 20px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  font-size: 13px;
  color: #999;
  margin-top: 12px;
  animation: pulse-hint 2.5s ease-in-out infinite;
}

@keyframes pulse-hint {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

#victory-ui {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  display: flex;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

#victory-ui.visible { opacity: 1; pointer-events: auto; }

#victory-ui button {
  padding: 12px 32px;
  border-radius: 24px;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #3a3a3a;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

#victory-ui button:hover {
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}

#books-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(245,241,234,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 80px 24px 40px;
}

#books-overlay.visible { opacity: 1; pointer-events: auto; }

#books-overlay h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 36px;
  color: #2a2a2a;
}

#books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 24px;
  max-width: 960px;
  margin: 0 auto;
}

.book-card-overlay {
  text-align: center;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.book-card-overlay.show { opacity: 1; transform: translateY(0); }

.book-card-overlay img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  margin-bottom: 8px;
}

.book-card-overlay .title {
  font-family: 'Instrument Serif', serif;
  font-size: 13px;
  line-height: 1.25;
  color: #3a3a3a;
  margin-bottom: 2px;
}

.book-card-overlay .author {
  font-size: 11px;
  color: #aaa;
}

#close-overlay {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 210;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.8);
  color: #888;
  font-size: 20px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

#close-overlay:hover { background: #fff; color: #333; }
#books-overlay.visible ~ #close-overlay { display: flex; }

.caught-toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  z-index: 55;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  padding: 8px 20px;
  font-size: 13px;
  color: #4a4a4a;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.caught-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  #books-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  #books-overlay { padding: 70px 16px 32px; }
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="score-bar">Books: <span id="score-count">0</span> / <span id="score-total">0</span></div>

<div id="start-screen">
  <h1>Snake Library</h1>
  <p>Catch all the books</p>
  <span class="start-key-hint">Arrow keys or swipe to start</span>
</div>

<div id="victory-ui">
  <button onclick="showAllBooks()">Show All</button>
  <button onclick="restartGame()">Restart</button>
</div>

<div id="books-overlay">
  <h2>Your Library</h2>
  <div id="books-grid"></div>
</div>
<button id="close-overlay" onclick="closeOverlay()">&times;</button>

<script>
const BOOKS=[
  {t:"Addiction by Design",a:"Natasha Dow Schüll",c:"https://covers.openlibrary.org/b/id/12898178-M.jpg"},
  {t:"Extreme Economies",a:"Richard Davies",c:"https://covers.openlibrary.org/b/id/12707846-M.jpg"},
  {t:"Small Rain",a:"Garth Greenwell",c:"https://covers.openlibrary.org/b/id/14744666-M.jpg"},
  {t:"The Maniac",a:"Benjamín Labatut",c:"https://covers.openlibrary.org/b/id/14036185-M.jpg"},
  {t:"Noise",a:"Daniel Kahneman",c:"https://covers.openlibrary.org/b/id/10981966-M.jpg"},
  {t:"Range",a:"David Epstein",c:"https://covers.openlibrary.org/b/id/8782615-M.jpg"},
  {t:"How We Got to Now",a:"Steven Johnson",c:"https://covers.openlibrary.org/b/id/9692318-M.jpg"},
  {t:"The Money Trap",a:"Alok Sama",c:"https://covers.openlibrary.org/b/id/14802826-M.jpg"},
  {t:"Exhalation",a:"Ted Chiang",c:"https://covers.openlibrary.org/b/id/8793546-M.jpg"},
  {t:"Small Data",a:"Martin Lindstrom",c:"https://covers.openlibrary.org/b/id/8881323-M.jpg"},
  {t:"Atomic Habits",a:"James Clear",c:"https://covers.openlibrary.org/b/id/12539702-M.jpg"},
  {t:"Loonshots",a:"Safi Bahcall",c:"https://covers.openlibrary.org/b/id/8518798-M.jpg"},
  {t:"No Rules Rules",a:"Reed Hastings",c:"https://covers.openlibrary.org/b/id/10524294-M.jpg"},
  {t:"Antifragile",a:"Nassim Nicholas Taleb",c:"https://covers.openlibrary.org/b/id/9180157-M.jpg"},
  {t:"Thinking, Fast and Slow",a:"Daniel Kahneman",c:"https://covers.openlibrary.org/b/id/15174454-M.jpg"},
  {t:"Outliers",a:"Malcolm Gladwell",c:"https://covers.openlibrary.org/b/id/10021591-M.jpg"},
  {t:"Sapiens",a:"Yuval Noah Harari",c:"https://covers.openlibrary.org/b/id/8634250-M.jpg"},
  {t:"The Alchemist",a:"Paulo Coelho",c:"https://covers.openlibrary.org/b/id/7414780-M.jpg"},
  {t:"The Lean Startup",a:"Eric Ries",c:"https://covers.openlibrary.org/b/id/7104760-M.jpg"},
  {t:"Factfulness",a:"Hans Rosling",c:"https://covers.openlibrary.org/b/id/8186237-M.jpg"},
  {t:"Man's Search for Meaning",a:"Viktor Frankl",c:"https://covers.openlibrary.org/b/id/8516506-M.jpg"},
  {t:"Behave",a:"Robert Sapolsky",c:"https://covers.openlibrary.org/b/id/8814831-M.jpg"},
  {t:"The Black Swan",a:"Nassim Nicholas Taleb",c:"https://covers.openlibrary.org/b/id/5721840-M.jpg"},
  {t:"Pride and Prejudice",a:"Jane Austen",c:"https://covers.openlibrary.org/b/id/523015-M.jpg"},
  {t:"Surely You're Joking, Mr. Feynman!",a:"Richard Feynman",c:"https://covers.openlibrary.org/b/id/9274698-M.jpg"},
  {t:"The Everything Store",a:"Brad Stone",c:"https://covers.openlibrary.org/b/id/7264584-M.jpg"},
  {t:"Stories of Your Life and Others",a:"Ted Chiang",c:"https://covers.openlibrary.org/b/id/524046-M.jpg"},
  {t:"Guns, Germs, and Steel",a:"Jared Diamond",c:"https://covers.openlibrary.org/b/id/7884018-M.jpg"},
];

// ============ CONFIG ============
let SPEED = 3;              // pixels per frame (increases with each book)
const SEG_SPACING = 8;      // trail samples between body nodes
const BODY_WIDTH = 16;       // snake thickness
const EAT_RADIUS = 40;      // how close head needs to be to food
const BOOK_W = 48;           // food book width
const BOOK_H = 72;           // food book height (2:3)
const SNAKE_HUE_START = 150; // teal
const SNAKE_HUE_END = 200;   // blue-ish

// ============ STATE ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, dpr;

let trail = [];         // array of {x, y} — every head position
let headX, headY;
let dir = { x: 1, y: 0 };
let nextDir = { x: 1, y: 0 };
let bodyLength = 5;     // number of body segments (grows as books eaten)
let food = null;        // {x, y, bookIdx, bobOffset}
let caughtBooks = [];
let uncaughtBooks = [];
let phase = 'start';
let images = {};
let toastTimeout = null;
let victoryTimer = 0;
let victoryNextTurn = 0;
let eatParticles = [];   // little burst particles

// ============ SIZING ============
function resize() {
  dpr = Math.min(window.devicePixelRatio, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ============ IMAGE PRELOAD ============
function preloadImages() {
  document.getElementById('score-total').textContent = BOOKS.length;
  BOOKS.forEach((b, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { images[i] = img; };
    img.onerror = () => {
      const c = document.createElement('canvas');
      c.width = 80; c.height = 120;
      const cx = c.getContext('2d');
      cx.fillStyle = '#e8e4dd';
      cx.fillRect(0, 0, 80, 120);
      cx.fillStyle = '#999';
      cx.font = '10px sans-serif';
      cx.textAlign = 'center';
      cx.fillText(b.t.slice(0, 14), 40, 60);
      images[i] = c;
    };
    img.src = b.c;
  });
}

// ============ INIT ============
function initGame() {
  resize();

  uncaughtBooks = BOOKS.map((_, i) => i);
  for (let i = uncaughtBooks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [uncaughtBooks[i], uncaughtBooks[j]] = [uncaughtBooks[j], uncaughtBooks[i]];
  }
  caughtBooks = [];
  bodyLength = 5;
  SPEED = 3;

  headX = W / 2;
  headY = H / 2;
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };

  // Pre-fill trail so body exists from the start
  trail = [];
  for (let i = 0; i < bodyLength * SEG_SPACING + 60; i++) {
    trail.push({ x: headX - i * SPEED, y: headY });
  }

  eatParticles = [];
  spawnFood();
  updateScore();
}

// ============ FOOD ============
function spawnFood() {
  if (uncaughtBooks.length === 0) { food = null; return; }
  const bookIdx = uncaughtBooks[0];
  const margin = 80;
  let x, y, attempts = 0;
  do {
    x = margin + Math.random() * (W - margin * 2);
    y = margin + Math.random() * (H - margin * 2);
    attempts++;
    // Don't spawn on snake head area
  } while (attempts < 100 && Math.hypot(x - headX, y - headY) < 120);

  // ~40% chance the book is dodgy (moves away when snake approaches)
  const dodgy = Math.random() < 0.4;
  food = { x, y, bookIdx, bobOffset: Math.random() * Math.PI * 2, dodgy, dodgesLeft: dodgy ? 1 + Math.floor(Math.random() * 2) : 0, dodging: false, targetX: x, targetY: y };
}

// ============ SCORE / TOAST ============
function updateScore() {
  document.getElementById('score-count').textContent = caughtBooks.length;
}

function showToast(text) {
  document.querySelectorAll('.caught-toast').forEach(t => t.remove());
  const toast = document.createElement('div');
  toast.className = 'caught-toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

// ============ EAT PARTICLES ============
function spawnEatParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 2.5;
    eatParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.015,
      r: 2 + Math.random() * 3,
      hue: SNAKE_HUE_START + Math.random() * (SNAKE_HUE_END - SNAKE_HUE_START),
    });
  }
}

function updateParticles() {
  for (let i = eatParticles.length - 1; i >= 0; i--) {
    const p = eatParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) eatParticles.splice(i, 1);
  }
}

// ============ UPDATE ============
function update() {
  if (phase === 'start') return;

  // Apply direction
  dir = { ...nextDir };

  // Move head
  headX += dir.x * SPEED;
  headY += dir.y * SPEED;

  // Wrap around
  if (headX < -20) headX = W + 20;
  if (headX > W + 20) headX = -20;
  if (headY < -20) headY = H + 20;
  if (headY > H + 20) headY = -20;

  // Record trail
  trail.unshift({ x: headX, y: headY });

  // Trim trail (keep enough for all body segments)
  const maxTrail = (bodyLength + 2) * SEG_SPACING + 20;
  if (trail.length > maxTrail) trail.length = maxTrail;

  // Dodge logic — book scoots away when snake gets close
  if (food && food.dodgesLeft > 0) {
    const dodgeDist = Math.hypot(headX - food.x, headY - food.y);
    if (dodgeDist < 90 && !food.dodging) {
      food.dodging = true;
      food.dodgesLeft--;

      // Flee away from the snake head
      const angle = Math.atan2(food.y - headY, food.x - headX);
      // Add some randomness to the flee angle
      const scatter = (Math.random() - 0.5) * 1.2;
      const fleeDist = 140 + Math.random() * 100;
      let nx = food.x + Math.cos(angle + scatter) * fleeDist;
      let ny = food.y + Math.sin(angle + scatter) * fleeDist;

      // Keep within bounds
      const margin = 80;
      nx = Math.max(margin, Math.min(W - margin, nx));
      ny = Math.max(margin, Math.min(H - margin, ny));

      food.targetX = nx;
      food.targetY = ny;
    }
  }

  // Smooth dodge movement
  if (food && food.dodging) {
    const dx = food.targetX - food.x;
    const dy = food.targetY - food.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 1) {
      food.x = food.targetX;
      food.y = food.targetY;
      food.dodging = false;
    } else {
      // Quick smooth ease-out
      food.x += dx * 0.18;
      food.y += dy * 0.18;
    }
  }

  // Check food
  if (food) {
    const dist = Math.hypot(headX - food.x, headY - food.y);
    if (dist < EAT_RADIUS) {
      caughtBooks.push(food.bookIdx);
      uncaughtBooks.shift();
      bodyLength += 3;
      // Speed scales linearly: 3 at start → 7 when all books caught
      SPEED = 3 + (caughtBooks.length / BOOKS.length) * 4;
      showToast('+ ' + BOOKS[food.bookIdx].t);
      spawnEatParticles(food.x, food.y);
      updateScore();

      if (uncaughtBooks.length === 0) {
        food = null;
        phase = 'victory';
        victoryTimer = 0;
        victoryNextTurn = 0;
        setTimeout(() => document.getElementById('victory-ui').classList.add('visible'), 1200);
      } else {
        spawnFood();
      }
    }
  }

  // Victory auto-movement
  if (phase === 'victory') {
    victoryTimer++;
    if (victoryTimer >= victoryNextTurn) {
      const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
      const valid = dirs.filter(d => !(d.x === -dir.x && d.y === -dir.y));
      nextDir = valid[Math.floor(Math.random() * valid.length)];
      victoryNextTurn = victoryTimer + 30 + Math.floor(Math.random() * 60);
    }
  }

  updateParticles();
}

// ============ DRAW ============
function draw(time) {
  // Background
  ctx.fillStyle = '#f5f1ea';
  ctx.fillRect(0, 0, W, H);

  // Subtle dot pattern
  ctx.fillStyle = 'rgba(0,0,0,0.025)';
  const dotSpacing = 32;
  const dotR = 1;
  const offsetX = (W % dotSpacing) / 2;
  const offsetY = (H % dotSpacing) / 2;
  for (let x = offsetX; x < W; x += dotSpacing) {
    for (let y = offsetY; y < H; y += dotSpacing) {
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw food (book)
  if (food) {
    const bob = Math.sin(time * 0.002 + food.bobOffset) * 3;
    const fx = food.x - BOOK_W / 2;
    const fy = food.y - BOOK_H / 2 + bob;
    const r = 4;

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur = 16;
    ctx.shadowOffsetY = 4;

    const img = images[food.bookIdx];
    if (img) {
      roundRectClip(ctx, fx, fy, BOOK_W, BOOK_H, r);
      ctx.drawImage(img, fx, fy, BOOK_W, BOOK_H);
      ctx.restore();
    } else {
      ctx.fillStyle = '#e8e4dd';
      roundRect(ctx, fx, fy, BOOK_W, BOOK_H, r);
    }

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Border
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    roundRectStroke(ctx, fx, fy, BOOK_W, BOOK_H, r);

    // Title below
    ctx.font = '500 11px "DM Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#777';
    const title = BOOKS[food.bookIdx].t;
    const truncated = title.length > 22 ? title.slice(0, 20) + '...' : title;
    ctx.fillText(truncated, food.x, food.y + BOOK_H / 2 + 16 + bob);
    ctx.textAlign = 'left';
  }

  // Draw snake body (smooth trail)
  if (trail.length > 2) {
    // Draw thick body with gradient hue
    const totalSegs = bodyLength * SEG_SPACING;
    const trailLen = Math.min(trail.length, totalSegs);

    if (trailLen > 2) {
      // Draw body as series of circles along trail for ultra-smooth look
      for (let i = trailLen - 1; i >= 0; i--) {
        if (i >= trail.length) continue;
        const t = i / trailLen;
        const hue = SNAKE_HUE_START + (SNAKE_HUE_END - SNAKE_HUE_START) * t;
        const sat = 45 + t * 15;
        const light = 55 + t * 10;
        const alpha = 0.15 + (1 - t) * 0.55;
        const width = BODY_WIDTH * (0.5 + (1 - t) * 0.5);

        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, width / 2, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
        ctx.fill();
      }

      // Draw a brighter core line
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trailLen && i < trail.length; i++) {
        ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.strokeStyle = `hsla(${SNAKE_HUE_START + 20}, 50%, 75%, 0.2)`;
      ctx.lineWidth = BODY_WIDTH * 0.3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
  }

  // Draw head
  const headRadius = BODY_WIDTH * 0.65;

  // Head shadow
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;

  const headGrad = ctx.createRadialGradient(headX, headY, 0, headX, headY, headRadius);
  headGrad.addColorStop(0, `hsl(${SNAKE_HUE_START}, 50%, 62%)`);
  headGrad.addColorStop(1, `hsl(${SNAKE_HUE_START + 10}, 45%, 52%)`);
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Eyes
  const eyeOffset = headRadius * 0.4;
  const eyeR = headRadius * 0.22;
  const pupilR = eyeR * 0.55;
  let e1x, e1y, e2x, e2y;

  if (dir.x === 1)       { e1x = headX + eyeOffset * 0.7; e1y = headY - eyeOffset; e2x = headX + eyeOffset * 0.7; e2y = headY + eyeOffset; }
  else if (dir.x === -1) { e1x = headX - eyeOffset * 0.7; e1y = headY - eyeOffset; e2x = headX - eyeOffset * 0.7; e2y = headY + eyeOffset; }
  else if (dir.y === -1) { e1x = headX - eyeOffset; e1y = headY - eyeOffset * 0.7; e2x = headX + eyeOffset; e2y = headY - eyeOffset * 0.7; }
  else                   { e1x = headX - eyeOffset; e1y = headY + eyeOffset * 0.7; e2x = headX + eyeOffset; e2y = headY + eyeOffset * 0.7; }

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath(); ctx.arc(e1x, e1y, pupilR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, pupilR, 0, Math.PI * 2); ctx.fill();

  // Eat particles
  for (const p of eatParticles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 50%, 60%, ${p.life * 0.6})`;
    ctx.fill();
  }
}

// ============ CANVAS HELPERS ============
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

function roundRectStroke(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function roundRectClip(ctx, x, y, w, h, r) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.clip();
}

// ============ GAME LOOP ============
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  update();
  draw(time);
}

// ============ INPUT ============
function setDirection(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return;
  if (dx === dir.x && dy === dir.y) return;
  nextDir = { x: dx, y: dy };

  if (phase === 'start') {
    phase = 'playing';
    document.getElementById('start-screen').classList.add('hidden');
  }
}

document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); setDirection(0, 1);  break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0);  break;
  }
});

let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
  else setDirection(0, dy > 0 ? 1 : -1);
}, { passive: true });

// ============ SHOW ALL / RESTART ============
function showAllBooks() {
  const overlay = document.getElementById('books-overlay');
  const grid = document.getElementById('books-grid');

  grid.innerHTML = caughtBooks.map((idx, i) => {
    const b = BOOKS[idx];
    return `<div class="book-card-overlay" style="transition-delay:${i * 35}ms">
      <img src="${b.c}" alt="${b.t}">
      <div class="title">${b.t}</div>
      <div class="author">${b.a}</div>
    </div>`;
  }).join('');

  overlay.classList.add('visible');
  document.getElementById('close-overlay').style.display = 'flex';

  requestAnimationFrame(() => {
    grid.querySelectorAll('.book-card-overlay').forEach(c => c.classList.add('show'));
  });
}

function closeOverlay() {
  document.getElementById('books-overlay').classList.remove('visible');
  document.getElementById('close-overlay').style.display = 'none';
}

function restartGame() {
  document.getElementById('victory-ui').classList.remove('visible');
  closeOverlay();
  phase = 'start';
  document.getElementById('start-screen').classList.remove('hidden');
  initGame();
}

window.addEventListener('resize', () => {
  resize();
});

// ============ BOOT ============
preloadImages();
initGame();
requestAnimationFrame(gameLoop);
</script>
