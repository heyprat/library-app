<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Sky</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Night Sky">
<meta property="og:description" content="A personal night sky of books">
<meta name="supabase-url" content="https://qndadicpfrqxxsvodpqc.supabase.co">
<meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuZGFkaWNwZnJxeHhzdm9kcHFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzIyMjgsImV4cCI6MjA4ODYwODIyOH0.AqxGEmldvJeps9SbJDMBfMeV0EmNDUkNaqtttfZbvoU">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0b0f;
  color:#e8e6e1;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  width:100vw;height:100vh;
  cursor:grab;
  touch-action:pan-x pan-y;
}
body:active{cursor:grabbing}

#sky{
  position:absolute;
  will-change:transform;
}

.bg-star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  opacity:0;
  animation:bgtwinkle linear infinite;
}
@keyframes bgtwinkle{
  0%,100%{opacity:.05}
  50%{opacity:.4}
}

#title{
  position:fixed;
  top:0;left:50%;
  transform:translateX(-50%);
  z-index:500;
  text-align:center;
  padding:24px 40px 16px;
  background:linear-gradient(to bottom, #0a0b0f 0%, #0a0b0f 60%, transparent 100%);
  border-radius:0 0 20px 20px;
}
#title h1{
  font-family:'Instrument Serif',serif;
  font-size:1.6rem;font-weight:400;
  color:rgba(212,200,168,.7);
  letter-spacing:.02em;
  text-shadow:0 0 40px rgba(212,200,168,.15);
}
#title .sub{
  font-size:.6rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(212,200,168,.4);
  margin-top:6px;font-weight:400;
}
#show-all{
  margin-top:10px;
  background:none;border:1px solid rgba(212,200,168,.2);
  color:rgba(212,200,168,.5);
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  padding:5px 16px;
  border-radius:100px;
  cursor:pointer;
  transition:all .25s;
  pointer-events:auto;
}
#show-all:hover{
  color:rgba(212,200,168,.8);
  border-color:rgba(212,200,168,.4);
  background:rgba(212,200,168,.06);
}
.make-own{
  position:fixed;
  bottom:32px;right:32px;
  z-index:500;
  background:rgba(212,200,168,.08);
  border:1px solid rgba(212,200,168,.2);
  color:rgba(212,200,168,.6);
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:10px 24px;
  border-radius:100px;
  cursor:pointer;
  transition:all .25s;
  pointer-events:auto;
  text-decoration:none;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.make-own:hover{
  color:rgba(212,200,168,.95);
  border-color:rgba(212,200,168,.45);
  background:rgba(212,200,168,.12);
}

.star{
  position:absolute;
  cursor:pointer;
  z-index:1;
  padding:30px;
  margin:-30px;
  transition:left .6s cubic-bezier(.25,.8,.25,1), top .6s cubic-bezier(.25,.8,.25,1);
}

.star .dot{
  width:var(--size);height:var(--size);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,248,230,var(--brightness)) 0%, rgba(212,200,168,calc(var(--brightness)*0.4)) 40%, transparent 70%);
  box-shadow:0 0 calc(var(--size)*2) rgba(212,200,168,calc(var(--brightness)*0.3)),
             0 0 calc(var(--size)*4) rgba(212,200,168,calc(var(--brightness)*0.1));
  animation:twinkle var(--duration) ease-in-out infinite;
  animation-delay:var(--delay);
  transition:opacity .3s, transform .3s, border-radius .15s, width .15s, height .15s;
  position:relative;
  z-index:2;
}

.star.near .dot{
  transform:scale(var(--prox-scale,1));
  filter:brightness(var(--prox-bright,1));
}

@keyframes twinkle{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.2)}
}

.star.sparkle .dot{
  animation:sparkle var(--duration) ease-in-out infinite;
  animation-delay:var(--delay);
}
@keyframes sparkle{
  0%,100%{opacity:.4;transform:scale(1);border-radius:50%}
  42%{opacity:.5;transform:scale(1);border-radius:50%}
  48%{opacity:1;transform:scale(2.2,3) translateY(-1px);border-radius:2px;filter:brightness(1.5)}
  52%{opacity:1;transform:scale(2.2,3) translateY(-1px);border-radius:2px;filter:brightness(1.5)}
  58%{opacity:.5;transform:scale(1);border-radius:50%}
}

.star.auto-reveal .dot{opacity:0;transform:scale(2)}
.star.auto-reveal .reveal{opacity:1;transform:translate(-50%,-50%) scale(1)}

.sky-revealed .star .dot{opacity:0!important;transform:scale(0)!important;animation:none!important}
.sky-revealed .star .reveal{opacity:1!important;transform:translate(-50%,-50%) scale(1)!important;pointer-events:auto!important}
.sky-revealed .star.dimmed .reveal{opacity:1!important}

.star .reveal{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.2);
  opacity:0;pointer-events:none;
  transition:opacity .35s cubic-bezier(.25,.8,.25,1), transform .35s cubic-bezier(.25,.8,.25,1);
  z-index:3;display:flex;flex-direction:column;align-items:center;width:80px;
}
.star .reveal img{
  width:70px;height:100px;object-fit:cover;border-radius:4px;
  box-shadow:0 0 24px rgba(212,200,168,.25), 0 0 50px rgba(212,200,168,.1), 0 4px 16px rgba(0,0,0,.6);
}
.star .reveal .ph{
  width:70px;height:100px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;padding:6px;
  font-family:'Instrument Serif',serif;font-size:.5rem;line-height:1.2;text-align:center;
  color:rgba(212,200,168,.5);
  background:linear-gradient(145deg,#1a1b22,#14151a);
  border:1px solid rgba(212,200,168,.1);
  box-shadow:0 0 24px rgba(212,200,168,.15), 0 4px 16px rgba(0,0,0,.6);
}
.star .reveal .label{
  margin-top:6px;text-align:center;font-size:.5rem;color:rgba(212,200,168,.6);
  line-height:1.3;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;
}
.star .reveal .label span{color:rgba(212,200,168,.3);font-size:.45rem}

.star:hover{z-index:500}
.star:hover .dot{opacity:0;transform:scale(2)}
.star:hover .reveal{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.star.dimmed .dot{opacity:.15!important;animation-play-state:paused}

.modal-bg{
  position:fixed;inset:0;z-index:1000;
  background:rgba(6,7,10,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
.modal-bg.open{display:flex;opacity:1}
.modal{
  background:#14151a;border:1px solid rgba(212,200,168,.08);border-radius:12px;
  padding:40px;max-width:380px;width:90%;position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 80px rgba(212,200,168,.04);
  transform:translateY(12px);transition:transform .3s cubic-bezier(.25,.8,.25,1);
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.modal-bg.open .modal{transform:translateY(0)}
.modal-x{
  position:absolute;top:14px;right:16px;background:none;border:none;
  font-size:1.2rem;cursor:pointer;color:rgba(212,200,168,.3);
  transition:color .15s;line-height:1;padding:4px;
}
.modal-x:hover{color:rgba(212,200,168,.8)}
.modal-img{
  width:140px;height:200px;object-fit:cover;border-radius:6px;margin-bottom:24px;
  box-shadow:0 0 40px rgba(212,200,168,.1),0 8px 24px rgba(0,0,0,.4);background:#1a1b22;
}
.modal-ph{
  width:140px;height:200px;border-radius:6px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;padding:16px;
  font-family:'Instrument Serif',serif;font-size:1rem;line-height:1.3;text-align:center;
  color:rgba(212,200,168,.5);background:linear-gradient(145deg,#1a1b22,#14151a);
  border:1px solid rgba(212,200,168,.06);
}
.modal h2{
  font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;
  margin-bottom:6px;line-height:1.25;color:#e8e6e1;
}
.modal .ma{font-size:.85rem;color:rgba(212,200,168,.4);margin-bottom:14px}
.modal .mg{
  font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(212,200,168,.5);background:rgba(212,200,168,.06);
  border:1px solid rgba(212,200,168,.1);padding:4px 14px;border-radius:100px;
}

#loading{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;z-index:600;
}
#loading .spinner{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(212,200,168,.15);
  border-top-color:rgba(212,200,168,.5);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{
  margin-top:16px;font-size:.75rem;color:rgba(212,200,168,.4);
  letter-spacing:.1em;text-transform:uppercase;
}
#error-msg{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;z-index:600;
}
#error-msg h2{
  font-family:'Instrument Serif',serif;font-size:1.4rem;font-weight:400;
  color:rgba(212,200,168,.6);margin-bottom:8px;
}
#error-msg p{font-size:.8rem;color:rgba(212,200,168,.35)}
#error-msg a{color:rgba(212,200,168,.5);margin-top:16px;font-size:.75rem}

.sky-actions{
  position:fixed;
  bottom:32px;right:32px;
  z-index:500;
  display:flex;gap:10px;
  align-items:center;
}
.sky-actions a, .sky-actions button{
  background:rgba(212,200,168,.08);
  border:1px solid rgba(212,200,168,.2);
  color:rgba(212,200,168,.6);
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:10px 24px;
  border-radius:100px;
  cursor:pointer;
  transition:all .25s;
  text-decoration:none;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.sky-actions a:hover, .sky-actions button:hover{
  color:rgba(212,200,168,.95);
  border-color:rgba(212,200,168,.45);
  background:rgba(212,200,168,.12);
}
.sky-actions .logout-btn{
  font-size:.6rem;
  padding:8px 16px;
  color:rgba(212,200,168,.35);
  border-color:rgba(212,200,168,.1);
  background:rgba(212,200,168,.03);
}

@media(max-width:600px){
  #title h1{font-size:1.2rem}
  .make-own{
    right:auto;left:50%;transform:translateX(-50%);
    bottom:24px;
  }
  .sky-actions{
    right:auto;left:50%;transform:translateX(-50%);
    bottom:24px;
  }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading sky...</p>
</div>
<div id="error-msg">
  <h2>Sky not found</h2>
  <p>This night sky doesn't exist yet.</p>
  <a href="/onboard">Create your own</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/sky-renderer.js"></script>
<script>
(async () => {
  // Extract username from URL path: /sky/username
  const parts = window.location.pathname.split('/').filter(Boolean);
  const username = parts[parts.length - 1];

  if (!username || username === 'sky') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
    return;
  }

  try {
    const res = await fetch('/api/user-sky?username=' + encodeURIComponent(username));
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';

    // Update page title and OG tags
    const displayTitle = (data.displayName || username) + '\u2019s Library';
    document.title = displayTitle + ' \u2014 Night Sky';

    // Hash username for deterministic seed
    let hash = 0;
    for (let i = 0; i < username.length; i++) {
      hash = ((hash << 5) - hash) + username.charCodeAt(i);
      hash |= 0;
    }

    // Check if the viewer is the sky owner
    let isOwner = false;
    let isLoggedIn = false;
    try {
      const session = await getSession();
      if (session) {
        isLoggedIn = true;
        const sb = getSupabase();
        const { data: profile } = await sb
          .from('users')
          .select('username')
          .eq('id', session.user.id)
          .single();
        if (profile && profile.username === username) {
          isOwner = true;
        }
      }
    } catch (e) {
      // Auth check failed, just show default UI
    }

    renderSky(document.body, data.books, {
      title: displayTitle,
      subtitle: data.books.length + ' books \u00b7 hover to reveal \u00b7 drag to explore',
      seed: Math.abs(hash) || 42,
      showMakeYourOwn: !isLoggedIn
    });

    // Show auth-aware actions
    if (isLoggedIn) {
      const actions = document.createElement('div');
      actions.className = 'sky-actions';

      if (isOwner) {
        const dash = document.createElement('a');
        dash.href = '/onboard';
        dash.textContent = 'Dashboard';
        actions.appendChild(dash);
      } else {
        const own = document.createElement('a');
        own.href = '/onboard';
        own.textContent = 'Make Your Own';
        actions.appendChild(own);
      }

      const logout = document.createElement('button');
      logout.className = 'logout-btn';
      logout.textContent = 'Sign Out';
      logout.addEventListener('click', async () => {
        await signOut();
        window.location.reload();
      });
      actions.appendChild(logout);

      document.body.appendChild(actions);
    }
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
  }
})();
</script>
</body>
</html>
