<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratyush's Library — Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f8f6f1;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;color:#1a1a18}

  .header{position:fixed;top:0;left:0;right:0;z-index:50;text-align:center;padding:28px 20px 12px;pointer-events:none}
  .header h1{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-.3px;color:#1a1a18}
  .header .sub{font-size:11px;color:#999;font-weight:300;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}

  .main{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:80px 20px 140px;position:relative}

  .cover-wrap{position:relative;width:300px;max-width:70vw;aspect-ratio:2/3;margin-bottom:24px;cursor:pointer}
  .cover-wrap img{width:100%;height:100%;object-fit:cover;border-radius:8px;box-shadow:0 16px 48px rgba(0,0,0,.18);display:block;transition:opacity .4s ease}
  .cover-wrap .fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;font-family:'Instrument Serif',serif;font-size:22px;line-height:1.3;color:#8a8478;background:linear-gradient(155deg,#e8e3d8,#d5cfc2);border-radius:8px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
  .cover-wrap:hover{transform:scale(1.02);transition:transform .2s}

  .info{text-align:center;transition:opacity .4s ease}
  .info h2{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px}
  .info .author{font-size:16px;color:#888;font-weight:300;margin-bottom:10px}
  .info .genre{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#c45d3e;font-weight:500}
  .info .counter{font-size:12px;color:#bbb;font-weight:300;margin-top:10px;letter-spacing:.3px}

  .nav-btn{position:fixed;top:50%;transform:translateY(-50%);z-index:60;background:rgba(26,26,24,.06);border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s;font-size:20px;color:#1a1a18}
  .nav-btn:hover{background:rgba(26,26,24,.12);transform:translateY(-50%) scale(1.1)}
  .nav-btn.prev{left:20px}
  .nav-btn.next{right:20px}

  .thumb-strip{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(248,246,241,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid #e4e0d6;padding:12px 0;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .thumb-strip::-webkit-scrollbar{display:none}
  .thumb-inner{display:inline-flex;gap:6px;padding:0 20px}
  .thumb{width:44px;height:66px;border-radius:4px;overflow:hidden;cursor:pointer;opacity:.4;transition:opacity .2s,transform .2s,box-shadow .2s;flex-shrink:0;background:#eae6dc;display:inline-flex;align-items:center;justify-content:center}
  .thumb:hover{opacity:.7;transform:scale(1.08)}
  .thumb.active{opacity:1;box-shadow:0 0 0 2px #1a1a18;transform:scale(1.08)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .fb{font-family:'Instrument Serif',serif;font-size:6px;line-height:1.2;color:#8a8478;text-align:center;padding:2px;overflow:hidden}

  .mb{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .mb.open{display:flex}
  .md{background:#fff;border-radius:14px;padding:32px;max-width:340px;width:90%;text-align:center;position:relative;animation:mi .2s ease}
  @keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .md img{width:130px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.15);margin-bottom:16px}
  .md .fl{width:130px;height:195px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-family:'Instrument Serif',serif;font-size:16px;line-height:1.3;color:#8a8478;background:linear-gradient(155deg,#e8e3d8,#d5cfc2);border-radius:6px}
  .md h3{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400;margin-bottom:4px}
  .md .ma{font-size:14px;color:#888;font-weight:300}
  .md .mg{display:inline-block;margin-top:10px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#c45d3e;font-weight:500}
  .mc{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;transition:color .15s}
  .mc:hover{color:#333}

  .fade-out{opacity:0!important;transition:opacity .25s ease!important}
  .fade-in{opacity:1;transition:opacity .4s ease}

  @media(max-width:600px){
    .cover-wrap{width:240px}
    .info h2{font-size:24px}
    .info .author{font-size:14px}
    .nav-btn{width:40px;height:40px;font-size:16px}
    .nav-btn.prev{left:10px}
    .nav-btn.next{right:10px}
    .thumb{width:36px;height:54px}
  }
</style>
</head>
<body>

<div class="header">
  <h1>Pratyush's Library</h1>
  <div class="sub" id="hc"></div>
</div>

<div class="main" id="main">
  <div class="cover-wrap" id="coverWrap" onclick="openModal()"></div>
  <div class="info" id="info"></div>
</div>

<button class="nav-btn prev" onclick="nav(-1)">&#8592;</button>
<button class="nav-btn next" onclick="nav(1)">&#8594;</button>

<div class="thumb-strip" id="strip">

</div>

<div class="mb" id="mbg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="md" id="md"></div>
</div>

const e=s=>(s||'').replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;");

let cur=0;
let transitioning=false;

document.getElementById("hc").textContent=B.length+" books";

// Build thumbnails
const thumbsEl=document.getElementById("thumbs");
B.forEach((b,i)=>{
  const d=document.createElement("div");
  d.className="thumb"+(i===0?" active":"");
  d.setAttribute("data-i",i);
  if(b.c){
    d.innerHTML='<img src="'+b.c+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="fb" style="display:none">'+e(b.t)+'</div>';
  } else {
    d.innerHTML='<div class="fb">'+e(b.t)+'</div>';
  }
  d.onclick=()=>goTo(i);
  thumbsEl.appendChild(d);
});

function renderBook(idx){
  const b=B[idx];
  const wrap=document.getElementById("coverWrap");
  const info=document.getElementById("info");

  if(b.c){
    wrap.innerHTML='<img src="'+b.c+'" alt="'+e(b.t)+'" onerror="this.outerHTML=\'<div class=fb>'+e(b.t).replace(/'/g,"")+'</div>\'"/>';
  } else {
    wrap.innerHTML='<div class="fb">'+e(b.t)+'</div>';
  }

  info.innerHTML='<h2>'+e(b.t)+'</h2>'+
    (b.a?'<div class="author">'+e(b.a)+'</div>':'')+
    '<div class="genre">'+e(b.g)+'</div>'+
    '<div class="counter">'+(idx+1)+' / '+B.length+'</div>';

  // Update thumbs
  document.querySelectorAll(".thumb").forEach((t,i)=>{
    t.classList.toggle("active",i===idx);
  });

  // Auto-scroll thumb strip
  const activeThumb=thumbsEl.children[idx];
  if(activeThumb){
    const strip=document.getElementById("strip");
    const thumbLeft=activeThumb.offsetLeft;
    const thumbWidth=activeThumb.offsetWidth;
    const stripWidth=strip.offsetWidth;
    strip.scrollTo({left:thumbLeft-stripWidth/2+thumbWidth/2,behavior:"smooth"});
  }
}

function goTo(idx){
  if(transitioning||idx===cur)return;
  transitioning=true;

  const wrap=document.getElementById("coverWrap");
  const info=document.getElementById("info");

  wrap.classList.add("fade-out");
  info.classList.add("fade-out");

  setTimeout(()=>{
    cur=idx;
    renderBook(cur);
    wrap.classList.remove("fade-out");
    info.classList.remove("fade-out");
    transitioning=false;
  },250);
}

function nav(dir){
  let next=cur+dir;
  if(next<0)next=B.length-1;
  if(next>=B.length)next=0;
  goTo(next);
}

// Keyboard
document.addEventListener("keydown",ev=>{
  if(document.getElementById("mbg").classList.contains("open")){
    if(ev.key==="Escape")document.getElementById("mbg").classList.remove("open");
    return;
  }
  if(ev.key==="ArrowLeft")nav(-1);
  else if(ev.key==="ArrowRight")nav(1);
  else if(ev.key==="Escape")document.getElementById("mbg").classList.remove("open");
});

// Touch swipe
let tx=0,ty=0;
document.addEventListener("touchstart",ev=>{
  if(ev.target.closest(".thumb-strip,.mb"))return;
  tx=ev.touches[0].clientX;ty=ev.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",ev=>{
  if(ev.target.closest(".thumb-strip,.mb"))return;
  const dx=ev.changedTouches[0].clientX-tx;
  const dy=ev.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    nav(dx<0?1:-1);
  }
},{passive:true});

// Modal
function openModal(){
  const b=B[cur];
  const m=document.getElementById("md");
  m.innerHTML='<button class="mc" onclick="document.getElementById(\'mbg\').classList.remove(\'open\')">&times;</button>'+
    (b.c?'<img src="'+b.c+'" alt="" onerror="this.outerHTML=\'<div class=fl>'+e(b.t).replace(/'/g,"")+'</div>\'"/>':'<div class="fl">'+e(b.t)+'</div>')+
    '<h3>'+e(b.t)+'</h3>'+(b.a?'<div class="ma">'+e(b.a)+'</div>':'')+
    '<div class="mg">'+e(b.g)+'</div>';
  document.getElementById("mbg").classList.add("open");
}

// Init
renderBook(0);
</script>
</body>
</html>
