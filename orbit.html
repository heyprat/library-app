<title>Pratyush's Library — Night Sky</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0b0f;
  color:#e8e6e1;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  width:100vw;height:100vh;
  cursor:grab;
}
body:active{cursor:grabbing}

#sky{
  position:absolute;
  will-change:transform;
}

/* Background atmosphere stars */
.bg-star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  opacity:0;
  animation:bgtwinkle linear infinite;
}
@keyframes bgtwinkle{
  0%,100%{opacity:.05}
  50%{opacity:.4}
}

/* Title overlay */
#title{
  position:fixed;
  top:0;left:50%;
  transform:translateX(-50%);
  z-index:500;
  text-align:center;
  padding:24px 40px 16px;
  background:linear-gradient(to bottom, #0a0b0f 0%, #0a0b0f 60%, transparent 100%);
  border-radius:0 0 20px 20px;
}
#title h1{
  font-family:'Instrument Serif',serif;
  font-size:1.6rem;font-weight:400;
  color:rgba(212,200,168,.7);
  letter-spacing:.02em;
  text-shadow:0 0 40px rgba(212,200,168,.15);
}
#title .sub{
  font-size:.6rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(212,200,168,.4);
  margin-top:6px;font-weight:400;
}
#show-all{
  margin-top:10px;
  background:none;border:1px solid rgba(212,200,168,.2);
  color:rgba(212,200,168,.5);
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  padding:5px 16px;
  border-radius:100px;
  cursor:pointer;
  transition:all .25s;
  pointer-events:auto;
}
#show-all:hover{
  color:rgba(212,200,168,.8);
  border-color:rgba(212,200,168,.4);
  background:rgba(212,200,168,.06);
}

/* Book star — the core element */
.star{
  position:absolute;
  cursor:pointer;
  z-index:1;
  /* Bigger hover target: 30px pad around the dot */
  padding:30px;
  margin:-30px;
  transition:left .6s cubic-bezier(.25,.8,.25,1), top .6s cubic-bezier(.25,.8,.25,1);
}

/* The glowing dot */
.star .dot{
  width:var(--size);height:var(--size);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,248,230,var(--brightness)) 0%, rgba(212,200,168,calc(var(--brightness)*0.4)) 40%, transparent 70%);
  box-shadow:0 0 calc(var(--size)*2) rgba(212,200,168,calc(var(--brightness)*0.3)),
             0 0 calc(var(--size)*4) rgba(212,200,168,calc(var(--brightness)*0.1));
  animation:twinkle var(--duration) ease-in-out infinite;
  animation-delay:var(--delay);
  transition:opacity .3s, transform .3s, border-radius .15s, width .15s, height .15s;
  position:relative;
  z-index:2;
}

/* Proximity glow — applied via JS based on cursor distance */
.star.near .dot{
  transform:scale(var(--prox-scale,1));
  filter:brightness(var(--prox-bright,1));
}

/* Default gentle pulse — all stars do this */
@keyframes twinkle{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.2)}
}

/* Noticeable sparkle — brief flash that morphs to book rectangle */
.star.sparkle .dot{
  animation:sparkle var(--duration) ease-in-out infinite;
  animation-delay:var(--delay);
}
@keyframes sparkle{
  0%,100%{opacity:.4;transform:scale(1);border-radius:50%}
  42%{opacity:.5;transform:scale(1);border-radius:50%}
  48%{opacity:1;transform:scale(2.2,3) translateY(-1px);border-radius:2px;filter:brightness(1.5)}
  52%{opacity:1;transform:scale(2.2,3) translateY(-1px);border-radius:2px;filter:brightness(1.5)}
  58%{opacity:.5;transform:scale(1);border-radius:50%}
}

/* Auto-reveal animation class */
.star.auto-reveal .dot{
  opacity:0;transform:scale(2);
}
.star.auto-reveal .reveal{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* Show-all mode — all stars reveal at once */
.sky-revealed .star .dot{
  opacity:0 !important;
  transform:scale(0) !important;
  animation:none !important;
}
.sky-revealed .star .reveal{
  opacity:1 !important;
  transform:translate(-50%,-50%) scale(1) !important;
  pointer-events:auto !important;
}
.sky-revealed .star.dimmed .reveal{
  opacity:1 !important;
}

/* The reveal container — hidden by default */
.star .reveal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.2);
  opacity:0;
  pointer-events:none;
  transition:opacity .35s cubic-bezier(.25,.8,.25,1), transform .35s cubic-bezier(.25,.8,.25,1);
  z-index:3;
  display:flex;flex-direction:column;align-items:center;
  width:80px;
}
.star .reveal img{
  width:70px;height:100px;
  object-fit:cover;
  border-radius:4px;
  box-shadow:0 0 24px rgba(212,200,168,.25), 0 0 50px rgba(212,200,168,.1), 0 4px 16px rgba(0,0,0,.6);
}
.star .reveal .ph{
  width:70px;height:100px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  padding:6px;
  font-family:'Instrument Serif',serif;
  font-size:.5rem;line-height:1.2;text-align:center;
  color:rgba(212,200,168,.5);
  background:linear-gradient(145deg,#1a1b22,#14151a);
  border:1px solid rgba(212,200,168,.1);
  box-shadow:0 0 24px rgba(212,200,168,.15), 0 4px 16px rgba(0,0,0,.6);
}
.star .reveal .label{
  margin-top:6px;
  text-align:center;
  font-size:.5rem;
  color:rgba(212,200,168,.6);
  line-height:1.3;
  white-space:nowrap;
  max-width:120px;
  overflow:hidden;
  text-overflow:ellipsis;
}
.star .reveal .label span{
  color:rgba(212,200,168,.3);
  font-size:.45rem;
}

/* Hover: dot fades, cover blooms */
.star:hover{z-index:500}
.star:hover .dot{
  opacity:0;
  transform:scale(2);
}
.star:hover .reveal{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  pointer-events:auto;
}

/* Dimming nearby stars on hover — handled via JS class */
.star.dimmed .dot{
  opacity:.15 !important;
  animation-play-state:paused;
}

/* Modal */
.modal-bg{
  position:fixed;inset:0;z-index:1000;
  background:rgba(6,7,10,.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
.modal-bg.open{display:flex;opacity:1}
.modal{
  background:#14151a;
  border:1px solid rgba(212,200,168,.08);
  border-radius:12px;
  padding:40px;
  max-width:380px;width:90%;
  position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 80px rgba(212,200,168,.04);
  transform:translateY(12px);
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.modal-bg.open .modal{transform:translateY(0)}
.modal-x{
  position:absolute;top:14px;right:16px;
  background:none;border:none;
  font-size:1.2rem;cursor:pointer;
  color:rgba(212,200,168,.3);
  transition:color .15s;line-height:1;padding:4px;
}
.modal-x:hover{color:rgba(212,200,168,.8)}
.modal-img{
  width:140px;height:200px;
  object-fit:cover;border-radius:6px;
  margin-bottom:24px;
  box-shadow:0 0 40px rgba(212,200,168,.1),0 8px 24px rgba(0,0,0,.4);
  background:#1a1b22;
}
.modal-ph{
  width:140px;height:200px;
  border-radius:6px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  font-family:'Instrument Serif',serif;
  font-size:1rem;line-height:1.3;text-align:center;
  color:rgba(212,200,168,.5);
  background:linear-gradient(145deg,#1a1b22,#14151a);
  border:1px solid rgba(212,200,168,.06);
}
.modal h2{
  font-family:'Instrument Serif',serif;
  font-size:1.4rem;font-weight:400;
  margin-bottom:6px;line-height:1.25;
  color:#e8e6e1;
}
.modal .ma{
  font-size:.85rem;
  color:rgba(212,200,168,.4);
  margin-bottom:14px;
}
.modal .mg{
  font-size:.65rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(212,200,168,.5);
  background:rgba(212,200,168,.06);
  border:1px solid rgba(212,200,168,.1);
  padding:4px 14px;border-radius:100px;
}

@media(max-width:600px){
  #title h1{font-size:1.2rem}
}
</style>
</head>

  {t:"Mother Mary Comes to Me",a:"Arundhati Roy",g:"Fiction",c:"https://covers.openlibrary.org/b/id/14981460-M.jpg"},
  {t:"The Scaling Era",a:"Dwarkesh Patel",g:"Science & Ideas"},
  {t:"Becoming Goan",a:"Mendonça Bambawale",g:"History"},
  {t:"Poverty and Income Distribution in India",a:"Abhijit Banerjee",g:"Economics"},
  {t:"Scoop!",a:"Kuldip Nayar",g:"History",c:"https://covers.openlibrary.org/b/id/1046216-M.jpg"},
  {t:"Why Nobody Understands Quantum Physics",a:"Frank Verstraete",g:"Science & Ideas"},
  {t:"Marx Engels Selected Works",a:"Marx & Engels",g:"Philosophy",c:"https://covers.openlibrary.org/b/id/11048623-M.jpg"},
  {t:"Fifty Great Contemporary Thinkers",a:"John Lechte",g:"Philosophy",c:"https://covers.openlibrary.org/b/id/1216392-M.jpg"},
  {t:"An Introduction to Indian Philosophy",a:"",g:"Philosophy",c:"https://covers.openlibrary.org/b/id/14905654-M.jpg"},
  {t:"The Nagas",a:"",g:"History",c:"https://covers.openlibrary.org/b/id/6917318-M.jpg"},
  {t:"A History of South India",a:"K.A.N. Sastri",g:"History"},
  {t:"The Greening of America",a:"Charles A. Reich",g:"History",c:"https://covers.openlibrary.org/b/id/7889534-M.jpg"},
  {t:"The Age of Atrocity",a:"Lawrence Langer",g:"History",c:"https://covers.openlibrary.org/b/id/4421304-M.jpg"},
  {t:"Orwell",a:"Raymond Williams",g:"Literature",c:"https://covers.openlibrary.org/b/id/13175019-M.jpg"},
  {t:"Hawthorne & History",a:"J. Hillis Miller",g:"Literature",c:"https://covers.openlibrary.org/b/id/12307847-M.jpg"},
  {t:"Theory of Meaning",a:"Lehrer & Lehrer",g:"Philosophy"},
];

const sky = document.getElementById('sky');

// Seeded random
let seed = 42;
function rand() {
  seed = (seed * 16807) % 2147483647;
  return (seed - 1) / 2147483646;
}

// Layout
const COLS = 14;
const ROWS = Math.ceil(B.length / COLS);
const CELL_W = 140;
const CELL_H = 140;
const SKY_W = COLS * CELL_W + 200;
const SKY_H = ROWS * CELL_H + 200;

sky.style.width = SKY_W + 'px';
sky.style.height = SKY_H + 'px';

// Background atmosphere stars (tiny, dim)
for (let i = 0; i < 250; i++) {
  const s = document.createElement('div');
  s.className = 'bg-star';
  s.style.left = (rand() * SKY_W) + 'px';
  s.style.top = (rand() * SKY_H) + 'px';
  const size = 1 + rand() * 1.5;
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  s.style.animationDuration = (4 + rand() * 8) + 's';
  s.style.animationDelay = (rand() * 6) + 's';
  sky.appendChild(s);
}

// Shuffle books
const shuffled = [...B];
for (let i = shuffled.length - 1; i > 0; i--) {
  const j = Math.floor(rand() * (i + 1));
  [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
}

// Place book stars
const starEls = [];
shuffled.forEach((book, i) => {
  const col = i % COLS;
  const row = Math.floor(i / COLS);

  const baseX = 100 + col * CELL_W + CELL_W / 2;
  const baseY = 100 + row * CELL_H + CELL_H / 2;
  const jitterX = (rand() - 0.5) * 80;
  const jitterY = (rand() - 0.5) * 70;

  const dotSize = 3 + rand() * 3; // 3-6px
  const brightness = 0.5 + rand() * 0.5; // 0.5-1.0
  const twinkleDuration = 3 + rand() * 5; // 3-8s
  const twinkleDelay = rand() * 6;

  const star = document.createElement('div');
  // ~30% of stars get a noticeable sparkle
  star.className = rand() < 0.3 ? 'star sparkle' : 'star';
  star.style.left = (baseX + jitterX) + 'px';
  star.style.top = (baseY + jitterY) + 'px';

  const coverHTML = book.c
    ? '<img src="' + book.c + '" alt="" loading="lazy">'
    : '<div class="ph">' + book.t + '</div>';

  star.innerHTML =
    '<div class="dot" style="--size:' + dotSize.toFixed(1) + 'px;--brightness:' + brightness.toFixed(2) + ';--duration:' + twinkleDuration.toFixed(1) + 's;--delay:' + twinkleDelay.toFixed(1) + 's"></div>' +
    '<div class="reveal">' +
      coverHTML +
      '<div class="label">' + book.t + (book.a ? '<br><span>' + book.a + '</span>' : '') + '</div>' +
    '</div>';

  star.addEventListener('click', () => openModal(book));

  // Dim nearby stars on hover
  star.addEventListener('mouseenter', () => {
    const cx = parseFloat(star.style.left);
    const cy = parseFloat(star.style.top);
    starEls.forEach(other => {
      if (other.el === star) return;
      const dx = other.x - cx;
      const dy = other.y - cy;
      if (dx * dx + dy * dy < 40000) { // within ~200px
        other.el.classList.add('dimmed');
      }
    });
  });
  star.addEventListener('mouseleave', () => {
    starEls.forEach(other => other.el.classList.remove('dimmed'));
  });

  sky.appendChild(star);
  starEls.push({ el: star, x: baseX + jitterX, y: baseY + jitterY });
});

// Proximity glow — stars brighten/grow as cursor approaches
let proxFrame = 0;
document.addEventListener('mousemove', e => {
  if (proxFrame) return; // throttle to rAF
  proxFrame = requestAnimationFrame(() => {
    proxFrame = 0;
    if (dragging) return;
    // Convert cursor to sky coords
    const skyRect = sky.getBoundingClientRect();
    const mx = e.clientX - skyRect.left;
    const my = e.clientY - skyRect.top;
    const RADIUS = 120;
    const R2 = RADIUS * RADIUS;
    for (let i = 0; i < starEls.length; i++) {
      const s = starEls[i];
      const dx = s.x - mx;
      const dy = s.y - my;
      const d2 = dx * dx + dy * dy;
      if (d2 < R2) {
        const t = 1 - Math.sqrt(d2) / RADIUS; // 0 at edge, 1 at center
        s.el.classList.add('near');
        s.el.style.setProperty('--prox-scale', (1 + t * 1.5).toFixed(2));
        s.el.style.setProperty('--prox-bright', (1 + t * 0.8).toFixed(2));
      } else if (s.el.classList.contains('near')) {
        s.el.classList.remove('near');
      }
    }
  });
});

// Auto-reveal: continuously bloom random stars
let autoRevealTimer = null;
function startAutoReveal() {
  function revealRandom() {
    if (allRevealed) return;
    // Pick a random star that isn't currently revealed
    const idx = Math.floor(Math.random() * starEls.length);
    const s = starEls[idx];
    if (!s.el.classList.contains('auto-reveal')) {
      s.el.classList.add('auto-reveal');
      const showDuration = 1500 + Math.random() * 1000; // 1.5-2.5s
      setTimeout(() => s.el.classList.remove('auto-reveal'), showDuration);
    }
    // Schedule next reveal at random interval (1.5-4s)
    const nextDelay = 1500 + Math.random() * 2500;
    autoRevealTimer = setTimeout(revealRandom, nextDelay);
  }
  // Start after a short initial delay
  autoRevealTimer = setTimeout(revealRandom, 800);
}
startAutoReveal();

// Center sky
let px = -(SKY_W / 2 - window.innerWidth / 2);
let py = -(SKY_H / 2 - window.innerHeight / 2);

function clamp() {
  const minX = -(SKY_W - window.innerWidth);
  const minY = -(SKY_H - window.innerHeight);
  if (SKY_W <= window.innerWidth) px = -(SKY_W - window.innerWidth) / 2;
  else px = Math.min(0, Math.max(minX, px));
  if (SKY_H <= window.innerHeight) py = -(SKY_H - window.innerHeight) / 2;
  else py = Math.min(0, Math.max(minY, py));
}
function render() { clamp(); sky.style.transform = 'translate(' + px + 'px,' + py + 'px)'; }
render();

// Drag to pan
let dragging = false, sx, sy, didDrag = false;
document.addEventListener('mousedown', e => {
  if (e.target.closest('.modal-bg')) return;
  if (e.target.closest('.star .reveal')) return;
  dragging = true; didDrag = false;
  sx = e.clientX - px; sy = e.clientY - py;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  didDrag = true;
  px = e.clientX - sx; py = e.clientY - sy; render();
});
document.addEventListener('mouseup', () => { dragging = false; });

document.addEventListener('touchstart', e => {
  if (e.target.closest('.modal-bg')) return;
  if (e.target.closest('.star .reveal')) return;
  dragging = true; didDrag = false;
  sx = e.touches[0].clientX - px; sy = e.touches[0].clientY - py;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  didDrag = true;
  px = e.touches[0].clientX - sx; py = e.touches[0].clientY - sy; render();
}, { passive: true });
document.addEventListener('touchend', () => { dragging = false; });

document.addEventListener('wheel', e => {
  if (document.querySelector('.modal-bg.open')) return;
  px -= e.deltaX; py -= e.deltaY; render();
}, { passive: true });

// Modal
function openModal(book) {
  if (didDrag) return;
  const m = document.getElementById('modal');
  m.innerHTML =
    '<button class="modal-x" onclick="closeModal()">&times;</button>' +
    (book.c
      ? '<img class="modal-img" src="' + book.c + '" alt="">'
      : '<div class="modal-ph">' + book.t + '</div>') +
    '<h2>' + book.t + '</h2>' +
    (book.a ? '<div class="ma">' + book.a + '</div>' : '<div class="ma"></div>') +
    '<div class="mg">' + book.g + '</div>';
  document.getElementById('mbg').classList.add('open');
}

function closeModal() {
  document.getElementById('mbg').classList.remove('open');
}

document.getElementById('mbg').addEventListener('click', e => {
  if (e.target === document.getElementById('mbg')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Show All toggle — reposition into spaced grid
const showBtn = document.getElementById('show-all');
let allRevealed = false;
const GRID_CELL_W = 120;
const GRID_CELL_H = 160;
const GRID_COLS = Math.ceil(Math.sqrt(starEls.length * (GRID_CELL_H / GRID_CELL_W)));
const GRID_ROWS = Math.ceil(starEls.length / GRID_COLS);
const GRID_W = GRID_COLS * GRID_CELL_W + 200;
const GRID_H = GRID_ROWS * GRID_CELL_H + 200;

showBtn.addEventListener('click', () => {
  allRevealed = !allRevealed;
  sky.classList.toggle('sky-revealed', allRevealed);
  showBtn.textContent = allRevealed ? 'Hide All' : 'Show All';

  if (allRevealed) {
    // Expand sky to fit grid
    const totalGridW = GRID_COLS * GRID_CELL_W;
    const totalGridH = GRID_ROWS * GRID_CELL_H + 200;
    const newW = Math.max(SKY_W, totalGridW + 200);
    const newH = Math.max(SKY_H, totalGridH);
    sky.style.width = newW + 'px';
    sky.style.height = newH + 'px';
    // Center the grid within the sky
    const offsetX = (newW - totalGridW) / 2;
    const offsetY = 100;
    // Move each star to a clean grid position
    starEls.forEach((s, i) => {
      const col = i % GRID_COLS;
      const row = Math.floor(i / GRID_COLS);
      const gx = offsetX + col * GRID_CELL_W + GRID_CELL_W / 2;
      const gy = offsetY + row * GRID_CELL_H + GRID_CELL_H / 2;
      s.el.style.left = gx + 'px';
      s.el.style.top = gy + 'px';
    });
  } else {
    // Restore original positions
    sky.style.width = SKY_W + 'px';
    sky.style.height = SKY_H + 'px';
    starEls.forEach(s => {
      s.el.style.left = s.x + 'px';
      s.el.style.top = s.y + 'px';
    });
  }
  // Re-center view
  const sw = parseInt(sky.style.width);
  const sh = parseInt(sky.style.height);
  px = -(sw / 2 - window.innerWidth / 2);
  py = -(sh / 2 - window.innerHeight / 2);
  render();
});
</script>
</body>
