<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratyush's Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f8f6f1;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;cursor:grab}
  body:active{cursor:grabbing}
  body.bm{overflow:hidden;cursor:default}

  #canvas{position:absolute;will-change:transform}
  .cg{display:grid;gap:40px;padding:40px}
  .cc{width:130px;height:195px;border-radius:4px;overflow:hidden;position:relative;background:#eae6dc;transition:transform .2s,box-shadow .2s;cursor:pointer}
  .cc:hover{transform:scale(1.06);box-shadow:0 8px 28px rgba(0,0,0,.15);z-index:10}
  .cc img{width:100%;height:100%;object-fit:cover;display:block}
  .cc .fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-family:'Instrument Serif',serif;font-size:13px;line-height:1.3;color:#8a8478}
  .cc .hi{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,0) 55%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;pointer-events:none}
  .cc:hover .hi{opacity:1}
  .hi .ht{font-family:'Instrument Serif',serif;font-size:12px;color:#fff;line-height:1.25}
  .hi .ha{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;font-weight:300}

  #hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#f8f6f1;border-radius:6px;z-index:10}
  #hero h1{font-family:'Instrument Serif',serif;font-size:48px;font-weight:400;color:#1a1a18;letter-spacing:-1px;line-height:1.1}
  #hero .sub{font-size:13px;color:#999;font-weight:300;margin-top:10px;letter-spacing:2px;text-transform:uppercase}
  #hero .cl{font-size:13px;color:#aaa;margin-top:14px;font-weight:300}
  #hero .cta{display:inline-block;margin-top:22px;padding:11px 30px;background:#1a1a18;color:#f8f6f1;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;border:none;letter-spacing:.3px}
  #hero .cta:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.2)}
  #hero .hint{font-size:11px;color:#bbb;margin-top:14px;font-weight:300}
  .bm #hero{display:none}

  .bb{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,246,241,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid #e4e0d6;padding:14px 24px;display:none;justify-content:space-between;align-items:center}
  .bm .bb{display:flex}
  .bb h2{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400}
  .bb .rt{display:flex;align-items:center;gap:14px}
  .bb .cnt{font-size:13px;color:#888;font-weight:300}
  .bb .sb{padding:7px 14px;border:1px solid #e4e0d6;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:200px;background:#fff;transition:border-color .2s}
  .bb .sb:focus{border-color:#999}
  .bb .bk{padding:7px 18px;border:1px solid #e4e0d6;border-radius:8px;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:#555;transition:background .15s}
  .bb .bk:hover{background:#eee}

  .bgw{position:fixed;inset:0;top:54px;z-index:90;overflow-y:auto;background:#f8f6f1;display:none;padding:20px}
  .bm .bgw{display:block}
  .bg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-width:1500px;margin:0 auto}
  .bc{aspect-ratio:2/3;border-radius:4px;overflow:hidden;position:relative;background:#eae6dc;cursor:pointer;transition:transform .2s}
  .bc:hover{transform:scale(1.04);z-index:5}
  .bc img{width:100%;height:100%;object-fit:cover;display:block}
  .bc .fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;font-family:'Instrument Serif',serif;font-size:12px;line-height:1.3;color:#8a8478}
  .bc .hi{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,0) 55%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .bc:hover .hi{opacity:1}

  .mb{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .mb.open{display:flex}
  .md{background:#fff;border-radius:14px;padding:32px;max-width:340px;width:90%;text-align:center;position:relative;animation:mi .2s ease}
  @keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .md img{width:130px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.15);margin-bottom:16px}
  .md .fl{width:130px;height:195px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-family:'Instrument Serif',serif;font-size:16px;line-height:1.3;color:#8a8478;background:linear-gradient(155deg,#e8e3d8,#d5cfc2);border-radius:6px}
  .md h3{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400;margin-bottom:4px}
  .md .ma{font-size:14px;color:#888;font-weight:300}
  .md .mg{display:inline-block;margin-top:10px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#c45d3e;font-weight:500}
  .mc{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;transition:color .15s}
  .mc:hover{color:#333}

  #prog{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:150;background:rgba(26,26,24,.88);color:#f8f6f1;padding:8px 22px;border-radius:20px;font-size:12px;font-weight:300;letter-spacing:.3px;transition:opacity .4s;pointer-events:none}
  #prog.done{opacity:0}

  @media(max-width:768px){
    .cg{gap:24px;padding:24px}
    .cc{width:100px;height:150px}
    #hero h1{font-size:32px}
    .bb{padding:12px 16px}
    .bb .sb{width:140px}
    .bg{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
  }
</style>
</head>
<body>

<div id="canvas"><div class="cg" id="grid">
  <div id="hero">
    <h1>Pratyush's<br>Library</h1>
    <div class="sub">A Personal Collection</div>
    <div class="cl" id="hc"></div>
    <button class="cta" onclick="enterBrowse()">Browse collection ↓</button>
    <div class="hint">or drag to explore the wall</div>
  </div>
</div></div>

<div class="bb">
  <h2>Collection</h2>
  <div class="rt">
    <span class="cnt" id="bc"></span>
    <input type="text" class="sb" id="sb" placeholder="Search..." oninput="renderBrowse()"/>
    <button class="bk" onclick="exitBrowse()">✕ Close</button>
  </div>
</div>

<div class="bgw"><div class="bg" id="bg"></div></div>

<div class="mb" id="mbg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="md" id="md"></div>
</div>

<div id="prog">Loading…</div>

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}

const COLS=11;
const WALL=sh([...B]).slice(0,COLS*Math.floor(B.length/COLS));
const ROWS=WALL.length/COLS;

// Build cover cache from pre-baked URLs
const CC={};
B.forEach(b=>{if(b.c)CC[b.t]=b.c});

// Build cell HTML
function ch(b,cls){
  const e=s=>s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;");
  return '<div class="'+cls+'" data-bt="'+e(b.t)+'" onclick="om(this)">'+
    (CC[b.t]?'<img src="'+CC[b.t]+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>':'')+
    '<div class="fb"'+(CC[b.t]?' style="display:none"':'')+'>'+e(b.t)+'</div>'+
    '<div class="hi"><div class="ht">'+e(b.t)+'</div>'+(b.a?'<div class="ha">'+e(b.a)+'</div>':'')+'</div></div>';
}

// Build wall with hero in center
const HERO_COLS=4,HERO_ROWS=2;
function buildWall(){
  const g=document.getElementById("grid");
  g.style.gridTemplateColumns="repeat("+COLS+", 130px)";
  const heroEl=document.getElementById("hero");
  // Calculate center position
  const centerRow=Math.floor(ROWS/2)-Math.floor(HERO_ROWS/2)+1;
  const centerCol=Math.floor(COLS/2)-Math.floor(HERO_COLS/2)+1;
  heroEl.style.gridColumn=centerCol+"/"+(centerCol+HERO_COLS);
  heroEl.style.gridRow=centerRow+"/"+(centerRow+HERO_ROWS);
  // Build cells (hero is already in grid, just add book cells)
  const cells=WALL.map(b=>ch(b,"cc")).join("");
  // Keep hero, replace the rest
  g.innerHTML=cells;
  g.appendChild(heroEl);
  heroEl.style.display="flex";
  centerCanvas();
}

// Center
const canvas=document.getElementById("canvas");
let px=0,py=0;
const CW=COLS*170+40; // grid width: cols*(card+gap)+padding
const CH=ROWS*235+40; // grid height: rows*(card+gap)+padding
function clamp(){
  const maxX=0,minX=-(CW-window.innerWidth);
  const maxY=0,minY=-(CH-window.innerHeight);
  if(CW<=window.innerWidth){px=-(CW-window.innerWidth)/2}else{px=Math.min(maxX,Math.max(minX,px))}
  if(CH<=window.innerHeight){py=-(CH-window.innerHeight)/2}else{py=Math.min(maxY,Math.max(minY,py))}
}
function ut(){clamp();canvas.style.transform="translate("+px+"px,"+py+"px)"}
function centerCanvas(){
  px=-(COLS*170/2-window.innerWidth/2);
  py=-(ROWS*235/2-window.innerHeight/2);
  ut();
}

// Drag
let dr=false,sx,sy;
document.addEventListener("mousedown",e=>{
  if(e.target.closest(".bb,.bgw,.mb,.cta,.bk,.sb,#hero"))return;
  dr=true;sx=e.clientX-px;sy=e.clientY-py;
});
document.addEventListener("mousemove",e=>{if(!dr)return;px=e.clientX-sx;py=e.clientY-sy;ut()});
document.addEventListener("mouseup",()=>{dr=false});
document.addEventListener("touchstart",e=>{
  if(e.target.closest(".bb,.bgw,.mb,.cta,.bk,.sb,#hero"))return;
  dr=true;sx=e.touches[0].clientX-px;sy=e.touches[0].clientY-py;
},{passive:true});
document.addEventListener("touchmove",e=>{if(!dr)return;px=e.touches[0].clientX-sx;py=e.touches[0].clientY-sy;ut()},{passive:true});
document.addEventListener("touchend",()=>{dr=false});
document.addEventListener("wheel",e=>{if(document.body.classList.contains("bm"))return;px-=e.deltaX;py-=e.deltaY;ut()},{passive:true});

// Hero count
document.getElementById("hc").textContent=B.length+" books · "+new Set(B.map(b=>b.g)).size+" genres";

// Browse
function enterBrowse(){document.body.classList.add("bm");renderBrowse()}
function exitBrowse(){document.body.classList.remove("bm");document.getElementById("sb").value=""}

function renderBrowse(){
  const s=document.getElementById("sb").value.toLowerCase();
  const sorted=[...B].sort((a,b)=>a.t.localeCompare(b.t));
  const f=s?sorted.filter(b=>b.t.toLowerCase().includes(s)||b.a.toLowerCase().includes(s)):sorted;
  document.getElementById("bc").textContent=f.length+" books";
  document.getElementById("bg").innerHTML=f.map(b=>ch(b,"bc")).join("");
}

// Modal
function om(el){
  const title=el.getAttribute("data-bt");
  const book=B.find(b=>b.t===title);
  if(!book)return;
  const m=document.getElementById("md");
  const url=CC[book.t];
  m.innerHTML='<button class="mc" onclick="document.getElementById(\'mbg\').classList.remove(\'open\')">&times;</button>'+
    (url?'<img src="'+url+'" alt="" onerror="this.outerHTML=\'<div class=fl>'+book.t.replace(/'/g,"")+'</div>\'"/>':'<div class="fl">'+book.t+'</div>')+
    '<h3>'+book.t+'</h3>'+(book.a?'<div class="ma">'+book.a+'</div>':'')+
    '<div class="mg">'+book.g+'</div>';
  document.getElementById("mbg").classList.add("open");
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("mbg").classList.remove("open")});

// Init
buildWall();
document.getElementById("prog").classList.add("done");
</script>
</body>
</html>
