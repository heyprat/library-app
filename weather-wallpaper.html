<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratyush's Library — Weather Wallpaper</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --glass-bg: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.18);
  --glass-blur: 20px;
  --text-primary: #fff;
  --text-secondary: rgba(255,255,255,0.7);
  --card-radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  background: #0a0b0f;
  color: var(--text-primary);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* === WALLPAPER LAYER === */
#wallpaper {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#wallpaper canvas,
#wallpaper-canvas {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
}

#night-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* === WEATHER EFFECTS LAYER === */
#weather-effects {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

/* Rain */
.raindrop {
  position: absolute;
  width: 2px;
  background: linear-gradient(to bottom, transparent, rgba(174,194,224,0.5));
  border-radius: 0 0 2px 2px;
  animation: rain-fall linear infinite;
  opacity: 0;
}

@keyframes rain-fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* Snow */
.snowflake {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  filter: blur(1px);
  animation: snow-fall linear infinite;
  opacity: 0;
}

@keyframes snow-fall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  50% { transform: translateY(50vh) translateX(30px) rotate(180deg); }
  90% { opacity: 0.6; }
  100% { transform: translateY(110vh) translateX(-10px) rotate(360deg); opacity: 0; }
}

/* Lightning */
#lightning-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0);
  z-index: 2;
  pointer-events: none;
  transition: background 0.05s;
}

.lightning-flash {
  animation: lightning 0.3s ease-out;
}

@keyframes lightning {
  0% { background: rgba(200,210,255,0.5); }
  20% { background: rgba(200,210,255,0.1); }
  40% { background: rgba(200,210,255,0.4); }
  100% { background: rgba(200,210,255,0); }
}

/* Fog bands */
.fog-band {
  position: absolute;
  width: 200%;
  height: 30%;
  background: linear-gradient(to right,
    transparent 0%,
    rgba(200,200,210,0.15) 20%,
    rgba(200,200,210,0.25) 50%,
    rgba(200,200,210,0.15) 80%,
    transparent 100%
  );
  filter: blur(40px);
  animation: fog-drift linear infinite;
  opacity: 0.7;
}

@keyframes fog-drift {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0%); }
}

/* === WEATHER BADGE === */
#weather-badge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}

#weather-badge .dot {
  display: inline-block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  vertical-align: middle;
}

/* === BOOKS TOGGLE BUTTON === */
#books-toggle {
  position: fixed;
  bottom: 70px;
  right: 20px;
  z-index: 99;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  color: rgba(255,255,255,0.8);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

#books-toggle:hover {
  background: rgba(0,0,0,0.5);
  border-color: rgba(255,255,255,0.25);
  transform: scale(1.08);
}

#books-toggle.active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.3);
}

/* === BOOK GRID === */
#book-scroll {
  position: fixed;
  inset: 0;
  z-index: 10;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 72px 24px 100px;
  -webkit-overflow-scrolling: touch;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  background: rgba(0,0,0,0.3);
}

#book-scroll.visible {
  opacity: 1;
  pointer-events: auto;
}

#book-scroll::-webkit-scrollbar {
  width: 6px;
}
#book-scroll::-webkit-scrollbar-track {
  background: transparent;
}
#book-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
}

#book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto;
  padding-bottom: 20px;
}

@media (max-width: 600px) {
  #book-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  #book-scroll { padding: 64px 12px 90px; }
}

/* === BOOK CARD === */
.book-card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  padding: 12px;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.25s ease,
              background 0.25s ease;
  will-change: transform;
}

.book-card:hover {
  transform: translateY(-6px) scale(1.02);
  background: rgba(255,255,255,0.18);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.2);
}

.book-card:active {
  transform: translateY(-2px) scale(0.98);
}

.book-cover-wrap {
  width: 100%;
  aspect-ratio: 2 / 3;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.05);
}

.book-cover-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.book-card:hover .book-cover-wrap img {
  transform: scale(1.03);
}

.book-title {
  font-family: 'Instrument Serif', serif;
  font-size: 15px;
  line-height: 1.25;
  color: var(--text-primary);
  margin-bottom: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.book-author {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.book-genre {
  display: inline-block;
  margin-top: 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 8px;
}

/* === MODAL === */
#modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#modal-overlay.visible {
  display: flex;
  opacity: 1;
}

#modal-card {
  background: rgba(30,30,40,0.85);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 32px;
  max-width: 400px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transform: scale(0.92);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#modal-overlay.visible #modal-card {
  transform: scale(1);
}

#modal-cover {
  width: 160px;
  aspect-ratio: 2 / 3;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}

#modal-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 24px;
  margin-bottom: 4px;
}

#modal-author {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

#modal-genre {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  padding: 4px 12px;
  border-radius: 10px;
}

#modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

#modal-close:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}

/* === CITY PICKER BAR === */
#city-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
}

#city-bar-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
}

#city-search {
  flex-shrink: 0;
  width: 140px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}

#city-search::placeholder { color: rgba(255,255,255,0.35); }
#city-search:focus {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.12);
}

#search-results {
  position: absolute;
  bottom: 100%;
  left: 16px;
  background: rgba(20,20,30,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 4px;
  display: none;
  min-width: 200px;
  max-width: 280px;
  margin-bottom: 8px;
}

#search-results.visible { display: block; }

.search-result-item {
  padding: 8px 12px;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}

.search-result-item:hover {
  background: rgba(255,255,255,0.1);
}

#city-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex: 1;
  padding: 2px 0;
}

#city-chips::-webkit-scrollbar { display: none; }

.city-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}

.city-chip:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
}

.city-chip.active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  font-weight: 500;
}

/* === LOADING STATE === */
#loading-screen {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: #0a0b0f;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  transition: opacity 0.6s ease;
}

#loading-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}

.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.02em;
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading weather...</div>
</div>

<!-- Wallpaper -->
<div id="wallpaper">
  <canvas id="night-canvas" style="display:none;"></canvas>
</div>

<!-- Weather effects -->
<div id="weather-effects"></div>
<div id="lightning-overlay"></div>

<!-- Weather badge -->
<div id="weather-badge">
  <span id="badge-text">Loading...</span>
</div>

<!-- Books toggle -->
<button id="books-toggle" onclick="toggleBooks()" title="Show books">&#x1F4DA;</button>

<!-- Book grid -->
<div id="book-scroll">
  <div id="book-grid"></div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-card">
    <button id="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-cover"><img src="" alt=""></div>
    <div id="modal-title"></div>
    <div id="modal-author"></div>
    <div id="modal-genre"></div>
  </div>
</div>

<!-- City picker -->
<div id="city-bar">
  <div id="search-results"></div>
  <div id="city-bar-inner">
    <input id="city-search" type="text" placeholder="Search city..." autocomplete="off">
    <div id="city-chips"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
<script>
// ============ DATA ============
const BOOKS=[
  {t:"Addiction by Design",a:"Natasha Dow Schüll",g:"Science & Ideas",c:"https://covers.openlibrary.org/b/id/12898178-M.jpg"},

  clear: 'kloofendal_43d_clear_puresky',
  cloudy: 'kloofendal_48d_partly_cloudy_puresky',

// ============ STATE ============
let currentCity = null;
let currentWeather = null;
let threeScene = null;

let threeRenderer = null;
let hdriMesh = null;
let animFrameId = null;
let isNight = false;
let nightAnimId = null;

// ============ BOOK GRID ============
function renderBooks() {
  const grid = document.getElementById('book-grid');
  grid.innerHTML = BOOKS.map((b, i) => `
    <div class="book-card" onclick="openModal(${i})">
      <div class="book-cover-wrap">
        <img src="${b.c}" alt="${b.t}" loading="lazy">
      </div>
      <div class="book-title">${b.t}</div>
      <div class="book-author">${b.a}</div>
      <div class="book-genre">${b.g}</div>
    </div>
  `).join('');

// ============ MODAL ============
function openModal(i) {
  const b = BOOKS[i];
  document.getElementById('modal-cover').querySelector('img').src = b.c;
  document.getElementById('modal-title').textContent = b.t;
  document.getElementById('modal-author').textContent = b.a;
  document.getElementById('modal-genre').textContent = b.g;
  const overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('visible');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('visible')) {
      closeModal();
    } else if (document.getElementById('book-scroll').classList.contains('visible')) {
      toggleBooks();
    }
  }
});

// ============ BOOKS TOGGLE ============
function toggleBooks() {
  const scroll = document.getElementById('book-scroll');
  const btn = document.getElementById('books-toggle');
  const showing = scroll.classList.toggle('visible');
  btn.classList.toggle('active', showing);
  btn.title = showing ? 'Hide books' : 'Show books';
}

// ============ CITY CHIPS ============
function renderCityChips() {
  const container = document.getElementById('city-chips');
  container.innerHTML = CITIES.map((c, i) => `
    <div class="city-chip" data-idx="${i}" onclick="selectCity(${i})">${c.name}</div>
  `).join('');
}

function selectCity(idx) {
  const city = CITIES[idx];
  currentCity = city;
  document.querySelectorAll('.city-chip').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  fetchWeather(city.lat, city.lon, city.name);
}

function selectCustomCity(name, lat, lon) {
  currentCity = { name, lat, lon };
  document.querySelectorAll('.city-chip').forEach(el => el.classList.remove('active'));
  fetchWeather(lat, lon, name);
  document.getElementById('city-search').value = '';
  document.getElementById('search-results').classList.remove('visible');
}

// ============ CITY SEARCH ============
let searchTimeout = null;
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('city-search');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = input.value.trim();
    if (q.length < 2) { results.classList.remove('visible'); return; }
    searchTimeout = setTimeout(async () => {
      try {
        const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
        const data = await resp.json();
        if (data.results && data.results.length) {
          results.innerHTML = data.results.map(r =>
            `<div class="search-result-item" onclick="selectCustomCity('${r.name.replace(/'/g,"\\'")}',${r.latitude},${r.longitude})">${r.name}${r.admin1 ? ', ' + r.admin1 : ''}${r.country ? ', ' + r.country : ''}</div>`
          ).join('');
          results.classList.add('visible');
        } else {
          results.classList.remove('visible');
        }
      } catch(e) { results.classList.remove('visible'); }
    }, 300);
  });

  input.addEventListener('blur', () => {
    setTimeout(() => results.classList.remove('visible'), 200);
  });
});

// ============ WEATHER API ============
function wmoToCondition(code) {
  if (code <= 1) return 'clear';
  if (code === 2) return 'cloudy';
  if (code === 3) return 'overcast';
  if (code >= 45 && code <= 48) return 'fog';
  if (code >= 51 && code <= 67) return 'rain';
  if (code >= 71 && code <= 86) return 'snow';
  if (code >= 95) return 'storm';
  return 'clear';
}

function wmoToDescription(code) {
  if (code === 0) return 'Clear Sky';
  if (code === 1) return 'Mainly Clear';
  if (code === 2) return 'Partly Cloudy';
  if (code === 3) return 'Overcast';
  if (code >= 45 && code <= 48) return 'Foggy';
  if (code >= 51 && code <= 55) return 'Drizzle';
  if (code >= 56 && code <= 57) return 'Freezing Drizzle';
  if (code >= 61 && code <= 65) return 'Rain';
  if (code >= 66 && code <= 67) return 'Freezing Rain';
  if (code >= 71 && code <= 75) return 'Snow';
  if (code >= 77 && code <= 77) return 'Snow Grains';
  if (code >= 80 && code <= 82) return 'Rain Showers';
  if (code >= 85 && code <= 86) return 'Snow Showers';
  if (code >= 95) return 'Thunderstorm';
  return 'Clear';
}

async function fetchWeather(lat, lon, cityName) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=sunrise,sunset&timezone=auto&forecast_days=1`;
    const resp = await fetch(url);
    const data = await resp.json();
    const cw = data.current_weather;
    const sunrise = data.daily.sunrise[0];
    const sunset = data.daily.sunset[0];

    currentWeather = {
      code: cw.weathercode,
      condition: wmoToCondition(cw.weathercode),
      description: wmoToDescription(cw.weathercode),
      temp: Math.round(cw.temperature),
      isDay: cw.is_day === 1,
      sunrise,
      sunset,
      time: cw.time,
    };

    // Detect golden hour
    const now = new Date(cw.time);
    const sunriseTime = new Date(sunrise);
    const sunsetTime = new Date(sunset);
    const msBefore = 30 * 60 * 1000;
    const msAfter = 40 * 60 * 1000;
    if (Math.abs(now - sunsetTime) < msAfter + msBefore) {
      currentWeather.goldenHour = 'sunset';
    } else if (Math.abs(now - sunriseTime) < msAfter + msBefore) {
      currentWeather.goldenHour = 'sunrise';
    }

    isNight = !currentWeather.isDay;

    updateBadge(cityName);
    updateWallpaper();
    updateWeatherEffects();
    hideLoading();
  } catch(e) {
    console.error('Weather fetch error:', e);
    document.getElementById('badge-text').textContent = `${cityName} · Unable to load weather`;
    hideLoading();
  }
}

function updateBadge(cityName) {
  const w = currentWeather;
  document.getElementById('badge-text').innerHTML =
    `${cityName} <span class="dot"></span> ${w.description} <span class="dot"></span> ${w.temp}°C`;
}

function hideLoading() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => ls.remove(), 600);
}

// ============ THREE.JS HDRI WALLPAPER ============
function initThree() {
  threeScene = new THREE.Scene();
  threeCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  threeCamera.position.set(0, 0, 0.01);

  threeRenderer = new THREE.WebGLRenderer({ antialias: true });
  threeRenderer.setSize(window.innerWidth, window.innerHeight);
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  threeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  threeRenderer.toneMappingExposure = 0.8;
  threeRenderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('wallpaper').prepend(threeRenderer.domElement);

  window.addEventListener('resize', () => {
    threeCamera.aspect = window.innerWidth / window.innerHeight;
    threeCamera.updateProjectionMatrix();
    threeRenderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function loadHDRI(slug) {
  const url = `https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/${slug}_2k.hdr`;
  const loader = new THREE.RGBELoader();

  loader.load(url, (texture) => {
    texture.mapping = THREE.EquirectangularReflectionMapping;

    // Create a large sphere for the sky
    if (hdriMesh) {
      threeScene.remove(hdriMesh);
      hdriMesh.geometry.dispose();
      hdriMesh.material.dispose();
    }

    const geo = new THREE.SphereGeometry(50, 64, 32);
    geo.scale(-1, 1, 1); // Invert so we see inside
    const mat = new THREE.MeshBasicMaterial({ map: texture });
    hdriMesh = new THREE.Mesh(geo, mat);
    threeScene.add(hdriMesh);

    startDayAnimation();
  }, undefined, (err) => {
    console.error('HDRI load error:', err);
  });
}

function startDayAnimation() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  const speed = 0.0003;
  function animate() {
    animFrameId = requestAnimationFrame(animate);
    if (hdriMesh) {
      hdriMesh.rotation.y += speed;
    }
    threeRenderer.render(threeScene, threeCamera);
  }
  animate();
}

// ============ NIGHT SKY (CANVAS) ============
function renderNightSky() {
  const canvas = document.getElementById('night-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth * Math.min(window.devicePixelRatio, 2);
  canvas.height = window.innerHeight * Math.min(window.devicePixelRatio, 2);
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  const ctx = canvas.getContext('2d');

  // Generate stars
  const stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      brightness: Math.random() * 0.5 + 0.5,
    });
  }

  // Moon
  const moonX = canvas.width * 0.78;
  const moonY = canvas.height * 0.15;
  const moonR = Math.min(canvas.width, canvas.height) * 0.04;

  if (nightAnimId) cancelAnimationFrame(nightAnimId);

  function drawNight(time) {
    nightAnimId = requestAnimationFrame(drawNight);

    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0c1a');
    grad.addColorStop(0.4, '#111528');
    grad.addColorStop(1, '#1a1c2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stars
    for (const s of stars) {
      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
      const alpha = s.brightness * twinkle;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
      ctx.fill();

      // Subtle glow for bigger stars
      if (s.r > 1) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 210, 255, ${alpha * 0.08})`;
        ctx.fill();
      }
    }

    // Moon
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
    const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR);
    moonGrad.addColorStop(0, 'rgba(255,252,240,0.95)');
    moonGrad.addColorStop(0.7, 'rgba(230,225,210,0.8)');
    moonGrad.addColorStop(1, 'rgba(200,195,180,0.4)');
    ctx.fillStyle = moonGrad;
    ctx.fill();

    // Moon glow
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2);
    const glowGrad = ctx.createRadialGradient(moonX, moonY, moonR, moonX, moonY, moonR * 3);
    glowGrad.addColorStop(0, 'rgba(200,210,230,0.12)');
    glowGrad.addColorStop(1, 'rgba(200,210,230,0)');
    ctx.fillStyle = glowGrad;
    ctx.fill();
  }
  drawNight(0);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth * Math.min(window.devicePixelRatio, 2);
    canvas.height = window.innerHeight * Math.min(window.devicePixelRatio, 2);
  });
}

// ============ WALLPAPER UPDATE ============
function updateWallpaper() {
  const w = currentWeather;
  if (!w) return;

  // Hide/show layers
  const nightCanvas = document.getElementById('night-canvas');
  const threeCanvas = document.getElementById('wallpaper').querySelector('canvas:not(#night-canvas)');

  if (isNight) {
    // Night mode: use canvas
    if (threeCanvas) threeCanvas.style.display = 'none';
    nightCanvas.style.display = 'block';
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    renderNightSky();
  } else {
    // Day mode: use HDRI
    nightCanvas.style.display = 'none';
    if (threeCanvas) threeCanvas.style.display = 'block';
    if (nightAnimId) { cancelAnimationFrame(nightAnimId); nightAnimId = null; }

    let slug;
    if (w.goldenHour === 'sunset') {
      slug = HDRI_SLUGS.sunset;
    } else if (w.goldenHour === 'sunrise') {
      slug = HDRI_SLUGS.sunrise;
    } else if (w.condition === 'fog') {
      slug = HDRI_SLUGS.fog;
    } else if (w.condition === 'overcast' || w.condition === 'rain' || w.condition === 'storm') {
      slug = HDRI_SLUGS.overcast;
    } else if (w.condition === 'cloudy' || w.condition === 'snow') {
      slug = HDRI_SLUGS.cloudy;
    } else {
      slug = HDRI_SLUGS.clear;
    }

    // Adjust exposure based on condition
    if (w.condition === 'overcast' || w.condition === 'fog') {
      threeRenderer.toneMappingExposure = 0.6;
    } else if (w.goldenHour) {
      threeRenderer.toneMappingExposure = 0.7;
    } else {
      threeRenderer.toneMappingExposure = 0.8;
    }

    loadHDRI(slug);
  }

  // Update glass tinting for day/night
  const root = document.documentElement;
  if (isNight) {
    root.style.setProperty('--glass-bg', 'rgba(255,255,255,0.08)');
    root.style.setProperty('--glass-border', 'rgba(255,255,255,0.12)');
  } else if (w.condition === 'overcast' || w.condition === 'fog') {
    root.style.setProperty('--glass-bg', 'rgba(255,255,255,0.15)');
    root.style.setProperty('--glass-border', 'rgba(255,255,255,0.22)');
  } else {
    root.style.setProperty('--glass-bg', 'rgba(255,255,255,0.12)');
    root.style.setProperty('--glass-border', 'rgba(255,255,255,0.18)');
  }
}

// ============ WEATHER EFFECTS ============
function updateWeatherEffects() {
  const container = document.getElementById('weather-effects');
  container.innerHTML = '';

  const w = currentWeather;
  if (!w) return;

  const cond = w.condition;

  // Rain
  if (cond === 'rain' || cond === 'storm') {
    const count = cond === 'storm' ? 120 : 70;
    for (let i = 0; i < count; i++) {
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      const h = Math.random() * 20 + 10;
      drop.style.cssText = `
        left: ${Math.random() * 100}%;
        height: ${h}px;
        animation-duration: ${Math.random() * 0.5 + 0.4}s;
        animation-delay: ${Math.random() * 2}s;
      `;
      container.appendChild(drop);
    }
  }

  // Snow
  if (cond === 'snow') {
    for (let i = 0; i < 60; i++) {
      const flake = document.createElement('div');
      flake.className = 'snowflake';
      const size = Math.random() * 5 + 3;
      flake.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        animation-duration: ${Math.random() * 4 + 4}s;
        animation-delay: ${Math.random() * 5}s;
      `;
      container.appendChild(flake);
    }
  }

  // Fog
  if (cond === 'fog') {
    for (let i = 0; i < 4; i++) {
      const band = document.createElement('div');
      band.className = 'fog-band';
      band.style.cssText = `
        top: ${i * 25 + Math.random() * 10}%;
        animation-duration: ${30 + Math.random() * 20}s;
        animation-delay: ${-Math.random() * 20}s;
        opacity: ${0.4 + Math.random() * 0.3};
      `;
      container.appendChild(band);
    }
  }

  // Lightning
  if (cond === 'storm') {
    const overlay = document.getElementById('lightning-overlay');
    function flash() {
      overlay.classList.add('lightning-flash');
      setTimeout(() => overlay.classList.remove('lightning-flash'), 300);
      setTimeout(flash, Math.random() * 8000 + 3000);
    }
    setTimeout(flash, Math.random() * 3000 + 1000);
  }
}

// ============ IP GEOLOCATION ============
async function detectLocation() {
  try {
    const resp = await fetch('https://ipapi.co/json/');
    const data = await resp.json();
    if (data.latitude && data.longitude) {
      const name = data.city || 'Your Location';
      // Check if it matches a preset city
      const matchIdx = CITIES.findIndex(c =>
        Math.abs(c.lat - data.latitude) < 0.5 && Math.abs(c.lon - data.longitude) < 0.5
      );
      if (matchIdx >= 0) {
        selectCity(matchIdx);
      } else {
        // Add as first "custom" pick
        currentCity = { name, lat: data.latitude, lon: data.longitude };
        fetchWeather(data.latitude, data.longitude, name);
      }
      return;
    }
  } catch(e) {
    console.warn('IP geolocation failed, falling back to New York');
  }
  // Fallback
  selectCity(0);
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
  renderBooks();
  renderCityChips();
  initThree();
  detectLocation();
});
