<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f8f6f1;
  color: #1a1a18;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #f8f6f1;
  border-bottom: 1px solid rgba(26,26,24,.08);
  padding: 28px 40px 24px;
  display: flex;
  align-items: baseline;
  gap: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(248,246,241,.88);
}

header h1 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 2rem;
  letter-spacing: -0.02em;
  line-height: 1;
}

header .count {
  font-size: 0.85rem;
  font-weight: 300;
  color: rgba(26,26,24,.45);
  letter-spacing: 0.04em;
}

/* Shelves container */
.shelves {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 40px 80px;
}

/* Individual shelf */
.shelf {
  margin-bottom: 12px;
}

.shelf-books {
  display: flex;
  gap: 20px;
  padding: 24px 20px 0;
  justify-content: flex-start;
  flex-wrap: nowrap;
}

.shelf-plank {
  height: 18px;
  background: linear-gradient(
    180deg,
    #b89a6a 0%,
    #c4a87a 15%,
    #a8895e 40%,
    #9a7c52 60%,
    #b89a6a 80%,
    #a08460 100%
  );
  border-radius: 0 0 3px 3px;
  box-shadow:
    0 4px 8px rgba(26,26,24,.15),
    0 2px 3px rgba(26,26,24,.1),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -2px 4px rgba(0,0,0,.12);
  position: relative;
}

.shelf-plank::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(180deg, #c9b38a, transparent);
  border-radius: 0 0 3px 3px;
}

.shelf-plank::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 4%;
  right: 4%;
  height: 8px;
  background: linear-gradient(180deg, rgba(26,26,24,.06), transparent);
  border-radius: 0 0 50% 50% / 0 0 100% 100%;
}

/* Book */
.book {
  flex: 0 0 auto;
  width: 110px;
  height: 165px;
  position: relative;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(.22,.68,.36,1.2), box-shadow 0.25s ease;
  transform-origin: bottom center;
  border-radius: 3px 5px 5px 3px;
  overflow: hidden;
  box-shadow:
    0 2px 4px rgba(26,26,24,.18),
    -2px 0 4px rgba(26,26,24,.06),
    1px 0 2px rgba(26,26,24,.08);
}

.book:hover {
  transform: translateY(-14px);
  box-shadow:
    0 14px 20px rgba(26,26,24,.18),
    0 6px 8px rgba(26,26,24,.12),
    -2px 0 4px rgba(26,26,24,.06);
}

.book-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 3px 5px 5px 3px;
}

.book-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  text-align: center;
  border-radius: 3px 5px 5px 3px;
  font-family: 'Instrument Serif', serif;
  font-size: 0.78rem;
  line-height: 1.3;
  color: #f8f6f1;
}

.book-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(26,26,24,.88) 0%, rgba(26,26,24,.4) 50%, transparent 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 10px;
  opacity: 0;
  transition: opacity 0.25s ease;
  border-radius: 3px 5px 5px 3px;
}

.book:hover .book-overlay {
  opacity: 1;
}

.book-overlay .overlay-title {
  font-family: 'Instrument Serif', serif;
  font-size: 0.78rem;
  color: #f8f6f1;
  line-height: 1.2;
  margin-bottom: 2px;
}

.book-overlay .overlay-author {
  font-size: 0.62rem;
  color: rgba(248,246,241,.7);
  font-weight: 300;
  line-height: 1.3;
}

/* Spine edge effect */
.book::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(90deg, rgba(0,0,0,.15), transparent);
  z-index: 2;
  pointer-events: none;
}

/* Modal backdrop */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26,26,24,.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.modal-backdrop.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: #f8f6f1;
  border-radius: 16px;
  box-shadow: 0 32px 64px rgba(26,26,24,.25), 0 8px 16px rgba(26,26,24,.12);
  max-width: 420px;
  width: 90%;
  overflow: hidden;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s cubic-bezier(.22,.68,.36,1.05);
}

.modal-backdrop.active .modal {
  transform: translateY(0) scale(1);
}

.modal-cover {
  width: 100%;
  height: 280px;
  object-fit: contain;
  background: rgba(26,26,24,.04);
  display: block;
  padding: 20px;
}

.modal-placeholder-cover {
  width: 100%;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 1.2rem;
  color: rgba(26,26,24,.35);
  background: rgba(26,26,24,.04);
}

.modal-body {
  padding: 28px 32px 32px;
}

.modal-body h2 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 1.5rem;
  line-height: 1.25;
  letter-spacing: -0.015em;
  margin-bottom: 6px;
}

.modal-body .modal-author {
  font-size: 0.9rem;
  color: rgba(26,26,24,.55);
  margin-bottom: 16px;
  font-weight: 400;
}

.modal-body .modal-genre {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(26,26,24,.45);
  background: rgba(26,26,24,.06);
  padding: 5px 12px;
  border-radius: 100px;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(248,246,241,.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: #1a1a18;
  transition: background 0.2s ease, transform 0.15s ease;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(26,26,24,.1);
}

.modal-close:hover {
  background: #fff;
  transform: scale(1.08);
}

.modal-inner {
  position: relative;
}

/* Responsive */
@media (max-width: 1100px) {
  .shelf-books { gap: 16px; }
  .book { width: 100px; height: 150px; }
}

@media (max-width: 860px) {
  header { padding: 22px 24px 20px; }
  .shelves { padding: 32px 24px 60px; }
  .shelf-books { gap: 14px; padding: 20px 14px 0; }
  .book { width: 90px; height: 135px; }
}

@media (max-width: 600px) {
  header h1 { font-size: 1.5rem; }
  .shelves { padding: 24px 16px 48px; }
  .shelf-books { gap: 10px; padding: 16px 10px 0; }
  .book { width: 80px; height: 120px; }
  .book-overlay .overlay-title { font-size: 0.68rem; }
  .book-overlay .overlay-author { font-size: 0.56rem; }
  .modal-cover { height: 220px; }
  .modal-body { padding: 22px 24px 28px; }
  .modal-body h2 { font-size: 1.25rem; }
}

@media (max-width: 420px) {
  .book { width: 70px; height: 105px; }
  .shelf-books { gap: 8px; padding: 14px 8px 0; }
}
</style>
</head>

<header>

    </div>

</div>

// Placeholder colors for books without covers
const palColors = [
  '#5c6b73','#9b2335','#2d4a3e','#8b6914','#4a3728',
  '#6b4c6e','#2c5f7c','#7a4419','#3d5a47','#8c4a5a',
  '#4e6d5e','#6e4b3a','#2a4858','#7b5e3b','#5a3e5c'
];

function getPlaceholderColor(i) {
  return palColors[i % palColors.length];
}

// Determine books per shelf based on viewport
function getBooksPerShelf() {
  const w = window.innerWidth;
  if (w <= 420) return 4;
  if (w <= 600) return 5;
  if (w <= 860) return 6;
  if (w <= 1100) return 7;
  return 8;
}

// Build shelves
function render() {
  const container = document.getElementById('shelves');
  container.innerHTML = '';
  const perShelf = getBooksPerShelf();

  document.getElementById('bookCount').textContent = B.length + ' books';

  for (let i = 0; i < B.length; i += perShelf) {
    const chunk = B.slice(i, i + perShelf);
    const shelf = document.createElement('div');
    shelf.className = 'shelf';

    const booksRow = document.createElement('div');
    booksRow.className = 'shelf-books';

    chunk.forEach((book, j) => {
      const idx = i + j;
      const el = document.createElement('div');
      el.className = 'book';
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', book.t);

      if (book.c) {
        const img = document.createElement('img');
        img.className = 'book-cover';
        img.src = book.c;
        img.alt = book.t;
        img.loading = 'lazy';
        el.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'book-placeholder';
        ph.style.background = getPlaceholderColor(idx);
        ph.textContent = book.t;
        el.appendChild(ph);
      }

      // Hover overlay
      const overlay = document.createElement('div');
      overlay.className = 'book-overlay';
      const oTitle = document.createElement('div');
      oTitle.className = 'overlay-title';
      oTitle.textContent = book.t;
      const oAuthor = document.createElement('div');
      oAuthor.className = 'overlay-author';
      oAuthor.textContent = book.a || '';
      overlay.appendChild(oTitle);
      overlay.appendChild(oAuthor);
      el.appendChild(overlay);

      el.addEventListener('click', () => openModal(idx));
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(idx);
        }
      });

      booksRow.appendChild(el);
    });

    const plank = document.createElement('div');
    plank.className = 'shelf-plank';

    shelf.appendChild(booksRow);
    shelf.appendChild(plank);
    container.appendChild(shelf);
  }
}

// Modal
const backdrop = document.getElementById('modalBackdrop');
const modalTitle = document.getElementById('modalTitle');
const modalAuthor = document.getElementById('modalAuthor');
const modalGenre = document.getElementById('modalGenre');
const modalCoverWrap = document.getElementById('modalCoverWrap');
const modalCloseBtn = document.getElementById('modalClose');

function openModal(idx) {
  const book = B[idx];
  modalTitle.textContent = book.t;
  modalAuthor.textContent = book.a || '';
  modalGenre.textContent = book.g;

  modalCoverWrap.innerHTML = '';
  if (book.c) {
    const img = document.createElement('img');
    img.className = 'modal-cover';
    img.src = book.c;
    img.alt = book.t;
    modalCoverWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'modal-placeholder-cover';
    ph.textContent = 'No cover available';
    modalCoverWrap.appendChild(ph);
  }

  backdrop.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  backdrop.classList.remove('active');
  document.body.style.overflow = '';
}

modalCloseBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', (e) => {
  if (e.target === backdrop) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Responsive re-render on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 150);
});

// Initial render
render();
</script>
