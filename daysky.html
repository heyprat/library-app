.book-cover img{width:100%;height:100%;object-fit:cover;display:block}

.book:hover .book-cover{transform:scale(1.6);box-shadow:0 8px 35px rgba(0,0,0,0.25)}

.book.auto-reveal .book-cover{transform:scale(1.4);box-shadow:0 6px 28px rgba(0,0,0,0.2)}
.book.auto-reveal .book-label{opacity:1;transform:translateY(0)}

.book-label{
  position:absolute;top:100%;left:50%;transform:translateX(-50%) translateY(4px);
  margin-top:8px;opacity:0;transition:opacity .4s ease,transform .4s ease;
  text-align:center;pointer-events:none;white-space:nowrap;
  transform:translateY(8px);
}
.book-label .bl-title{
  font-size:9px;color:rgba(30,50,90,0.9);line-height:1.3;
  text-shadow:0 0 12px rgba(255,255,255,0.9),0 0 24px rgba(255,255,255,0.6);
  max-width:100px;overflow:hidden;text-overflow:ellipsis;
}
.book-label .bl-author{
  font-size:8px;color:rgba(30,50,90,0.55);
  text-shadow:0 0 12px rgba(255,255,255,0.9);
}

/* Show All mode */
.sky-revealed .book-cover{transform:scale(1)!important}
.sky-revealed .book-label{opacity:1!important;transform:translateY(0)!important}
.sky-revealed .book{cursor:pointer}

.modal-bg{
  position:fixed;inset:0;background:rgba(30,60,110,0.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);

  opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;
}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{

  box-shadow:0 12px 50px rgba(30,60,110,0.25);position:relative;
  transform:translateY(20px);transition:transform .3s;
}

<script id="sky-vertex" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
</script>

<script id="sky-fragment" type="x-shader/x-fragment">
precision highp float;

varying vec2 vUv;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uPan;       // normalized pan offset for parallax

// --- Noise functions ---
// Hash without sin (better precision)
float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

// FBM — fractal Brownian motion
float fbm(vec2 p, int octaves) {
  float value = 0.0;
  float amplitude = 0.5;
  float frequency = 1.0;
  for (int i = 0; i < 7; i++) {
    if (i >= octaves) break;
    value += amplitude * noise(p * frequency);
    frequency *= 2.0;
    amplitude *= 0.5;
  }
  return value;
}

// --- Sky gradient (atmospheric scattering approximation) ---
vec3 skyGradient(vec2 uv) {
  float y = uv.y;

  // Deep blue at top, lighter toward horizon
  vec3 top = vec3(0.12, 0.38, 0.85);       // deep blue
  vec3 mid = vec3(0.35, 0.6, 0.95);        // medium blue
  vec3 horizon = vec3(0.7, 0.85, 0.98);    // pale blue-white
  vec3 bottom = vec3(0.82, 0.92, 1.0);     // very pale

  vec3 col;
  if (y > 0.6) {
    col = mix(mid, top, (y - 0.6) / 0.4);
  } else if (y > 0.25) {
    col = mix(horizon, mid, (y - 0.25) / 0.35);
  } else {
    col = mix(bottom, horizon, y / 0.25);
  }

  return col;
}

// --- Sun ---
vec3 addSun(vec2 uv, vec3 col) {
  vec2 sunPos = vec2(0.78, 0.82);
  float d = length(uv - sunPos);

  // Sun disk
  float sun = smoothstep(0.035, 0.02, d);
  col = mix(col, vec3(1.0, 0.99, 0.95), sun * 0.95);

  // Inner glow
  float glow1 = exp(-d * 12.0) * 0.6;
  col += vec3(1.0, 0.95, 0.8) * glow1;

  // Outer glow — warm haze
  float glow2 = exp(-d * 4.0) * 0.15;
  col += vec3(1.0, 0.9, 0.7) * glow2;

  // Atmospheric halo
  float halo = exp(-d * 2.0) * 0.08;
  col += vec3(0.9, 0.85, 0.75) * halo;

  return col;
}

// --- Cloud layer ---
float cloudDensity(vec2 p, float time) {
  vec2 wind = vec2(time * 0.008, time * 0.003);
  float base = fbm(p * 0.8 + wind, 5);
  // Detail layer
  float detail = fbm(p * 2.5 + wind * 1.5, 4) * 0.35;
  // Wispy layer
  float wisp = fbm(p * 5.0 + wind * 2.0, 3) * 0.15;
  float density = base + detail + wisp;
  // Threshold and shape
  density = smoothstep(0.42, 0.72, density);
  return density;
}

// Volumetric cloud with fake light scattering
vec4 cloudLayer(vec2 uv, float time, float scale, float height, float speed, float opacity) {
  vec2 pan = uPan * 0.15 * (1.0 - height); // parallax based on height
  vec2 p = (uv + pan) * scale;
  p.x *= uResolution.x / uResolution.y; // aspect correction

  float density = cloudDensity(p, time * speed);

  // Light direction (from sun)
  vec2 sunDir = normalize(vec2(0.78, 0.82) - uv);
  float lightSample = cloudDensity(p + sunDir * 0.04, time * speed);
  float lightDiff = clamp(density - lightSample, 0.0, 1.0);

  // Cloud color: lit side bright white, shadowed side blue-grey
  vec3 litColor = vec3(1.0, 1.0, 1.0);
  vec3 shadowColor = vec3(0.7, 0.75, 0.85);
  vec3 cloudCol = mix(shadowColor, litColor, 0.5 + lightDiff * 0.5);

  // Silver lining near edges
  float edge = smoothstep(0.0, 0.3, density) * (1.0 - smoothstep(0.3, 0.8, density));
  cloudCol += vec3(0.15, 0.13, 0.1) * edge;

  return vec4(cloudCol, density * opacity);
}

void main() {
  vec2 uv = vUv;
  float time = uTime;

  // Sky gradient
  vec3 col = skyGradient(uv);

  // Sun
  col = addSun(uv, col);

  // Cloud layers (back to front for proper compositing)
  // High thin cirrus
  vec4 c3 = cloudLayer(uv, time, 1.8, 0.9, 0.4, 0.25);
  col = mix(col, c3.rgb, c3.a);

  // Mid-level clouds
  vec4 c2 = cloudLayer(uv, time, 1.2, 0.6, 0.7, 0.5);
  col = mix(col, c2.rgb, c2.a);

  // Low cumulus (main clouds)
  vec4 c1 = cloudLayer(uv, time, 0.7, 0.3, 1.0, 0.75);
  col = mix(col, c1.rgb, c1.a);

  // Slight vignette
  float vig = 1.0 - length((uv - 0.5) * vec2(0.8, 1.0)) * 0.3;
  col *= vig;

  // Tone mapping (subtle)
  col = pow(col, vec3(0.97));

  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
// ===== WebGL Sky =====
const canvas = document.getElementById('sky-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const uniforms = {
  uTime: { value: 0 },
  uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  uPan: { value: new THREE.Vector2(0, 0) }
};

const skyMaterial = new THREE.ShaderMaterial({
  vertexShader: document.getElementById('sky-vertex').textContent,
  fragmentShader: document.getElementById('sky-fragment').textContent,
  uniforms
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), skyMaterial);
scene.add(quad);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});

const startTime = performance.now();
function animateSky() {
  uniforms.uTime.value = (performance.now() - startTime) / 1000;
  renderer.render(scene, camera);
  requestAnimationFrame(animateSky);
}
animateSky();

// Seeded random
let seed = 42;
function rand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

const sky = document.getElementById('sky');

// Layout
const COLS = Math.max(6, Math.ceil(Math.sqrt(B.length * 1.4)));
const ROWS = Math.ceil(B.length / COLS);
const CELL_W = 160, CELL_H = 150;
const SKY_W = COLS * CELL_W + 200;
const SKY_H = ROWS * CELL_H + 200;
sky.style.width = SKY_W + 'px';
sky.style.height = SKY_H + 'px';

// Shuffle
const shuffled = [...B];
for (let i = shuffled.length - 1; i > 0; i--) {
  const j = Math.floor(rand() * (i + 1));
  [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
}

// Place books
const bookEls = [];
shuffled.forEach((book, i) => {
  const col = i % COLS;
  const row = Math.floor(i / COLS);
  const baseX = 100 + col * CELL_W + CELL_W / 2;
  const baseY = 100 + row * CELL_H + CELL_H / 2;
  const jitterX = (rand() - 0.5) * 100;
  const jitterY = (rand() - 0.5) * 80;
  const cx = baseX + jitterX;
  const cy = baseY + jitterY;

  const floatDur = 5 + rand() * 6;
  const floatDel = -rand() * 8;
  const floatY = -(3 + rand() * 5);

  const el = document.createElement('div');
  el.className = 'book';
  el.style.left = cx + 'px';
  el.style.top = cy + 'px';

  const coverHTML = book.c
    ? '<img src="' + book.c + '" alt="" loading="lazy">'
    : '<div class="ph-mini">' + book.t + '</div>';

  el.innerHTML =
    '<div class="book-inner" style="' +
      '--float-dur:' + floatDur.toFixed(1) + 's;' +
      '--float-del:' + floatDel.toFixed(1) + 's;' +
      '--float-y:' + floatY.toFixed(1) + 'px;' +
    '">' +
      '<div class="book-cover">' + coverHTML + '</div>' +
      '<div class="book-label">' +
        '<div class="bl-title">' + book.t + '</div>' +
        (book.a ? '<div class="bl-author">' + book.a + '</div>' : '') +
      '</div>' +
    '</div>';

  el.addEventListener('click', () => openModal(book));
  el.addEventListener('mouseenter', () => {
    bookEls.forEach(other => {
      if (other.el === el) return;
      const dx = other.x - cx, dy = other.y - cy;
      if (dx * dx + dy * dy < 35000) other.el.classList.add('dimmed');
    });
  });
  el.addEventListener('mouseleave', () => {
    bookEls.forEach(other => other.el.classList.remove('dimmed'));
  });

  sky.appendChild(el);
  bookEls.push({ el, x: cx, y: cy });
});

// Auto-reveal
let allRevealed = false;
function startAutoReveal() {
  function revealRandom() {
    if (allRevealed) return;
    const vw = window.innerWidth, vh = window.innerHeight, margin = 60;
    const visible = bookEls.filter(s => {
      const sx = s.x + px, sy = s.y + py;
      return sx > -margin && sx < vw + margin && sy > -margin && sy < vh + margin;
    });
    const pool = visible.length > 0 ? visible : bookEls;
    const s = pool[Math.floor(Math.random() * pool.length)];
    if (!s.el.classList.contains('auto-reveal')) {
      s.el.classList.add('auto-reveal');
      setTimeout(() => s.el.classList.remove('auto-reveal'), 2000 + Math.random() * 1000);
    }
    setTimeout(revealRandom, 2000 + Math.random() * 3000);
  }
  setTimeout(revealRandom, 1000);
}
startAutoReveal();

// Pan
let px = -(SKY_W / 2 - window.innerWidth / 2);
let py = -(SKY_H / 2 - window.innerHeight / 2);

function clamp() {
  const minX = -(SKY_W - window.innerWidth), minY = -(SKY_H - window.innerHeight);
  if (SKY_W <= window.innerWidth) px = -(SKY_W - window.innerWidth) / 2;
  else px = Math.min(0, Math.max(minX, px));
  if (SKY_H <= window.innerHeight) py = -(SKY_H - window.innerHeight) / 2;
  else py = Math.min(0, Math.max(minY, py));
}

function renderPos() {
  clamp();
  sky.style.transform = 'translate(' + px + 'px,' + py + 'px)';
  // Update shader parallax
  uniforms.uPan.value.set(
    px / window.innerWidth,
    py / window.innerHeight
  );
}
renderPos();

// Drag
let dragging = false, sx, sy, didDrag = false;
document.addEventListener('mousedown', e => {
  if (e.target.closest('.modal-bg') || e.target.closest('.book-label') || e.target.closest('#title')) return;
  dragging = true; didDrag = false;
  sx = e.clientX - px; sy = e.clientY - py;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  didDrag = true;
  px = e.clientX - sx; py = e.clientY - sy; renderPos();
});
document.addEventListener('mouseup', () => { dragging = false; });

document.addEventListener('touchstart', e => {
  if (e.target.closest('.modal-bg') || e.target.closest('.book-label') || e.target.closest('#title')) return;
  dragging = true; didDrag = false;
  sx = e.touches[0].clientX - px; sy = e.touches[0].clientY - py;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!dragging) return; didDrag = true;
  px = e.touches[0].clientX - sx; py = e.touches[0].clientY - sy; renderPos();
}, { passive: true });
document.addEventListener('touchend', () => { dragging = false; });

document.addEventListener('wheel', e => {
  if (document.querySelector('.modal-bg.open')) return;
  px -= e.deltaX; py -= e.deltaY; renderPos();
}, { passive: true });

// Modal
function openModal(book) {
  if (didDrag) return;
  const m = document.getElementById('modal');
  m.innerHTML =
    '<button class="modal-x" onclick="document.getElementById(\'mbg\').classList.remove(\'open\')">&times;</button>' +
    (book.c
      ? '<img class="modal-img" src="' + book.c + '" alt="">'
      : '<div class="modal-ph">' + book.t + '</div>') +
    '<h2>' + book.t + '</h2>' +
    (book.a ? '<div class="ma">' + book.a + '</div>' : '<div class="ma"></div>') +
    '<div class="mg">' + book.g + '</div>';
  document.getElementById('mbg').classList.add('open');
}
document.getElementById('mbg').addEventListener('click', e => {
  if (e.target === document.getElementById('mbg')) document.getElementById('mbg').classList.remove('open');
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('mbg').classList.remove('open'); });

// Show All
const showBtn = document.getElementById('show-all');
const GRID_CELL_W = 120, GRID_CELL_H = 160;
const GRID_COLS = Math.ceil(Math.sqrt(bookEls.length * (GRID_CELL_H / GRID_CELL_W)));

showBtn.addEventListener('click', () => {
  allRevealed = !allRevealed;
  sky.classList.toggle('sky-revealed', allRevealed);
  showBtn.textContent = allRevealed ? 'Hide All' : 'Show All';

  if (allRevealed) {
    const GRID_ROWS = Math.ceil(bookEls.length / GRID_COLS);
    const totalGridW = GRID_COLS * GRID_CELL_W;
    const totalGridH = GRID_ROWS * GRID_CELL_H + 200;
    const newW = Math.max(SKY_W, totalGridW + 200);
    const newH = Math.max(SKY_H, totalGridH);
    sky.style.width = newW + 'px';
    sky.style.height = newH + 'px';
    const offsetX = (newW - totalGridW) / 2;
    const offsetY = 100;
    bookEls.forEach((s, i) => {
      const col = i % GRID_COLS;
      const row = Math.floor(i / GRID_COLS);
      s.el.style.left = (offsetX + col * GRID_CELL_W + GRID_CELL_W / 2) + 'px';
      s.el.style.top = (offsetY + row * GRID_CELL_H + GRID_CELL_H / 2) + 'px';
    });
  } else {
    sky.style.width = SKY_W + 'px';
    sky.style.height = SKY_H + 'px';
    bookEls.forEach(s => { s.el.style.left = s.x + 'px'; s.el.style.top = s.y + 'px'; });
  }
  const sw = parseInt(sky.style.width), sh = parseInt(sky.style.height);
  px = -(sw / 2 - window.innerWidth / 2);
  py = -(sh / 2 - window.innerHeight / 2);
  renderPos();
});

// Prevent pinch zoom
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
</script>
